name: Deploy to GitHub Pages

# Build-less Pages deploy. Just publishes the repo root as-is.
# The Owner Console writes data/*.json on every publish; the
# next push triggers a redeploy and visitors see the change.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-flight deploys when a newer push lands.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Whole repo, no build step. .nojekyll is already in the repo so
          # Pages won't try to run Jekyll on it.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
