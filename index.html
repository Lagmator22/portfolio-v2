<link rel="stylesheet" href="publish/console.css">

<script>
/* TWEAK_DEFAULTS — runtime config read by the React app and the cursor / theme
 * scripts. Persists to localStorage under "gurman.tweaks.v2" once a user (or
 * owner) tweaks anything via the Tweaks panel; persisted values override these.
 *
 * Fields:
 *   accent     One of the keys in :root [data-accent=…] overrides.
 *              Available: indigo · purple · blue · cyan · green · yellow
 *                         gold · orange · red · pink   (plus dracula / monokai themes)
 *   mode       "dark" | "light" | "system"
 *   monsters   true → pixel familiars render; false → canvas bails early.
 *   blogFont   "source-serif" | "georgia" | "garamond" | "times"
 *   motion     "full" | "subtle" | "none"      (drives the --motion CSS var)
 *   density    "compact" | "comfortable" | "roomy"
 *   cursor     "comet" | "pixel" | "nova" | "ribbon" | "spark" | "blade"
 *              | "terminal" | "crosshair" | "off"
 *   scrollFx   Reserved — currently unused, left in for forward-compat.
 *   ownerHash  SHA-256 hex of the owner password. Compared client-side; the
 *              plaintext password never touches the source.
 *
 * To rotate the owner password:
 *   echo -n "your-new-password" | shasum -a 256
 *   Paste the 64-char hex into ownerHash below. Commit + push. Next reload
 *   the old password stops working and yours takes over.
 *   Don't commit the plaintext anywhere in the repo.
 */
const TWEAK_DEFAULTS = {
  "accent": "indigo",
  "mode": "dark",
  "monsters": true,
  "blogFont": "times",
  "motion": "full",
  "density": "roomy",
  "cursor": "crosshair",
  "scrollFx": true,
  "ownerHash": "0c1a27670aecc48ee49e582446a65d19a9122a849b4ce26f3160c8dc29f17724"
};
window.TWEAK_DEFAULTS = TWEAK_DEFAULTS;
</script>

<style>
/* ============================================================
 * DESIGN SYSTEM — TOKENS + COMPONENTS
 * ============================================================
 * Organisation:
 *   1. TOKENS        — fonts, scales, OKLCH colors, motion
 *   2. BASE          — resets, body, noise overlay, focus
 *   3. NAV           — sticky nav + mobile drawer
 *   4. HERO          — title, marquee, monster arena, hp bar
 *   5. BUTTONS/CHIPS — pills, primary/ghost/sm variants
 *   6. SECTIONS      — section header pattern + reveals
 *   7. PROJECTS      — grid cards + detail page
 *   8. BLOG          — post cards + reader typography
 *   9. CONTACT       — form + side rail
 *  10. CURSOR FX     — per-mode SHAPES (one rule each)
 *  11. MODAL/TWEAKS  — backdrop + tweaks panel
 *  12. FOOTER        — four-column with brand
 *  13. HERO REFINEMENTS — marquee, status, monster card
 *  14. CURSOR LAB    — 9-tile picker on home
 *  15. STUDY LAB     — color-coded resource cards
 *  16. ABOUT         — stack columns
 *  17. SCROLL UX     — progress bar, hint, section index
 *  18. ANIMATIONS    — reveals, stagger, glow halos
 *
 * COLOR SYSTEM
 * ------------
 * Everything is OKLCH-based. The accent hue is the single knob
 * (toggled by [data-accent="…"]); chroma and lightness are
 * fixed. Switch palette in TWEAK_DEFAULTS.accent or via the
 * Tweaks panel. Light mode is a separate ink-inverted block at
 * [data-mode="light"].
 *
 * MOTION
 * ------
 * --motion (0..1) is a runtime multiplier set by the Tweaks
 * panel. 0 disables animations for prefers-reduced-motion or
 * "motion: none".
 *
 * EDITS
 * -----
 * Adding new components? Put their rules in the matching
 * section above. Keep selectors flat (single-class) where
 * possible — easier to override + faster to grep.
 * ============================================================ */

/* ================================================================
   1. TOKENS
================================================================ */
:root{
  --font-mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --font-display:'Space Grotesk',system-ui,sans-serif;
  --font-serif:'Source Serif 4','Source Serif Pro',Georgia,serif;

  --fs-micro:11px; --fs-xs:12px; --fs-sm:13px; --fs-base:15px; --fs-md:17px;
  --fs-lg:22px; --fs-xl:32px; --fs-2xl:48px; --fs-3xl:72px; --fs-hero:112px;

  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px; --sp-6:32px;
  --sp-8:48px; --sp-10:64px; --sp-12:96px; --sp-16:160px;

  --r-sm:6px; --r:8px; --r-lg:14px; --r-xl:18px; --r-full:999px;

  --ease-out:cubic-bezier(0.22,1,0.36,1);
  --ease-soft:cubic-bezier(0.65,0,0.35,1);
  --dur-fast:140ms; --dur-base:280ms; --dur-slow:560ms;
  --motion:1; --density:1;

  --content-w:1240px; --reading-w:680px;

  --accent-h:275;
  --accent:oklch(0.72 0.18 var(--accent-h));
  --accent-hi:oklch(0.82 0.15 var(--accent-h));
  --accent-lo:oklch(0.58 0.20 var(--accent-h));
  --accent-glow:oklch(0.72 0.18 var(--accent-h) / 0.35);
  --accent-ink:oklch(0.14 0.008 280);

  --bg:oklch(0.14 0.008 280);
  --bg-raised:oklch(0.18 0.01 280);
  --bg-sunken:oklch(0.10 0.006 280);
  --surface:oklch(0.22 0.012 280);
  --line:oklch(0.28 0.014 280);
  --line-strong:oklch(0.38 0.018 280);

  --ink:oklch(0.96 0.004 280);
  --ink-2:oklch(0.78 0.008 280);
  --ink-3:oklch(0.58 0.010 280);
  --ink-4:oklch(0.42 0.010 280);

  color-scheme:dark;
}
[data-mode="light"]{
  --bg:oklch(0.985 0.004 80);
  --bg-raised:oklch(0.96 0.006 80);
  --bg-sunken:oklch(1 0 0);
  --surface:oklch(0.93 0.008 80);
  --line:oklch(0.86 0.010 80);
  --line-strong:oklch(0.72 0.014 80);
  --ink:oklch(0.18 0.012 280);
  --ink-2:oklch(0.34 0.012 280);
  --ink-3:oklch(0.52 0.010 280);
  --ink-4:oklch(0.68 0.008 280);
  --accent-ink:oklch(1 0 0);
  /* Darker accent in light mode so cursor particles + monster ink have real contrast. */
  --accent:oklch(0.48 0.18 var(--accent-h));
  --accent-hi:oklch(0.58 0.15 var(--accent-h));
  --accent-lo:oklch(0.36 0.20 var(--accent-h));
  --accent-glow:oklch(0.48 0.18 var(--accent-h) / 0.40);
  color-scheme:light;
}
/* === VS-Code-style theme palettes — each forces its own bg/ink AND signature accent ===
   When the user picks one of these via Tweaks, JS also sets data-accent to a matching hue
   so the swatch grid lights up the right pip. The --accent-h overrides below are belt-and-
   suspenders: even if the user manually picks a different swatch, the theme keeps its vibe. */
[data-mode="dracula"]{
  --bg:oklch(0.22 0.025 285);          /* #282a36-ish */
  --bg-raised:oklch(0.27 0.030 285);
  --bg-sunken:oklch(0.18 0.022 285);
  --surface:oklch(0.32 0.035 285);
  --line:oklch(0.36 0.040 285);
  --line-strong:oklch(0.46 0.048 285);
  --ink:oklch(0.96 0.018 95);           /* warm #f8f8f2 */
  --ink-2:oklch(0.82 0.020 95);
  --ink-3:oklch(0.66 0.030 290);
  --ink-4:oklch(0.50 0.040 290);
  --accent-h:295;                       /* dracula purple */
  color-scheme:dark;
}
[data-mode="cyberpunk"]{
  --bg:oklch(0.12 0.030 320);           /* near-black, magenta tilt */
  --bg-raised:oklch(0.17 0.045 320);
  --bg-sunken:oklch(0.08 0.025 320);
  --surface:oklch(0.22 0.060 320);
  --line:oklch(0.30 0.080 320);
  --line-strong:oklch(0.42 0.110 320);
  --ink:oklch(0.97 0.080 95);           /* neon cream */
  --ink-2:oklch(0.85 0.090 95);
  --ink-3:oklch(0.68 0.110 320);        /* hot pink muted text */
  --ink-4:oklch(0.50 0.090 320);
  --accent-h:90;                        /* neon yellow */
  color-scheme:dark;
}
[data-mode="crimson"]{
  --bg:oklch(0.14 0.040 25);            /* near-black with red bleed */
  --bg-raised:oklch(0.20 0.055 25);
  --bg-sunken:oklch(0.10 0.030 25);
  --surface:oklch(0.26 0.070 25);
  --line:oklch(0.34 0.080 25);
  --line-strong:oklch(0.46 0.110 25);
  --ink:oklch(0.96 0.012 30);
  --ink-2:oklch(0.80 0.022 25);
  --ink-3:oklch(0.62 0.035 25);
  --ink-4:oklch(0.46 0.045 25);
  --accent-h:25;                        /* signature red */
  color-scheme:dark;
}
[data-mode="forest"]{
  --bg:oklch(0.16 0.030 150);
  --bg-raised:oklch(0.21 0.040 150);
  --bg-sunken:oklch(0.11 0.022 150);
  --surface:oklch(0.27 0.050 150);
  --line:oklch(0.34 0.060 150);
  --line-strong:oklch(0.46 0.075 150);
  --ink:oklch(0.96 0.020 130);
  --ink-2:oklch(0.80 0.030 145);
  --ink-3:oklch(0.62 0.040 150);
  --ink-4:oklch(0.46 0.045 150);
  --accent-h:150;                       /* moss green */
  color-scheme:dark;
}
[data-mode="solarized"]{
  --bg:oklch(0.27 0.030 220);           /* solarized dark base03 */
  --bg-raised:oklch(0.33 0.035 220);
  --bg-sunken:oklch(0.22 0.025 220);
  --surface:oklch(0.40 0.040 220);
  --line:oklch(0.46 0.045 220);
  --line-strong:oklch(0.56 0.050 220);
  --ink:oklch(0.92 0.040 85);           /* base2-ish */
  --ink-2:oklch(0.78 0.045 85);
  --ink-3:oklch(0.62 0.040 200);
  --ink-4:oklch(0.50 0.040 200);
  --accent-h:75;                        /* solarized gold */
  color-scheme:dark;
}
[data-accent="indigo"]{--accent-h:275}
[data-accent="purple"]{--accent-h:310}
[data-accent="blue"]{--accent-h:245}
[data-accent="cyan"]{--accent-h:210}
[data-accent="green"]{--accent-h:150}
[data-accent="yellow"]{--accent-h:95}
[data-accent="gold"]{--accent-h:75}
[data-accent="orange"]{--accent-h:50}
[data-accent="red"]{--accent-h:25}
[data-accent="pink"]{--accent-h:355}

/* ================================================================
   BASE
================================================================ */
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--ink);
  font-family:var(--font-mono);font-size:var(--fs-base);line-height:1.5;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;background:none;border:0;color:inherit}
img,canvas,svg{max-width:100%;display:block}
::selection{background:var(--accent);color:var(--accent-ink)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:2px}
.shell{max-width:var(--content-w);margin:0 auto;padding:0 clamp(16px,4vw,32px);position:relative;z-index:2}
.noise{
  pointer-events:none;position:fixed;inset:0;z-index:1;opacity:.035;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}

/* ================================================================
   NAV
================================================================ */
.nav{
  position:sticky;top:0;z-index:60;
  backdrop-filter:blur(12px) saturate(1.4);-webkit-backdrop-filter:blur(12px) saturate(1.4);
  background:color-mix(in oklch,var(--bg) 80%,transparent);
  border-bottom:1px solid var(--line);
}
.nav__row{
  max-width:var(--content-w);margin:0 auto;padding:14px clamp(16px,4vw,32px);
  display:flex;align-items:center;gap:14px;
}
.nav__logo{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:600;letter-spacing:-0.01em;font-size:15px;}
.nav__dot{width:10px;height:10px;background:var(--accent);border-radius:3px;box-shadow:0 0 14px var(--accent-glow);}
.nav__logo small{color:var(--ink-3);font-weight:400}
.nav__links{display:flex;gap:4px;margin-left:24px}
.nav__link{
  font-family:var(--font-mono);font-size:13px;color:var(--ink-3);
  padding:7px 12px;border-radius:8px;cursor:pointer;
  transition:all var(--dur-fast) var(--ease-out);
}
.nav__link:hover{color:var(--ink);background:var(--surface)}
.nav__link[data-active="true"]{color:var(--accent);background:color-mix(in oklch,var(--accent) 12%,transparent)}
.nav__spacer{flex:1}
.nav__tool{
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--font-mono);font-size:12px;color:var(--ink-2);
  padding:7px 11px;border-radius:8px;border:1px solid var(--line);background:var(--bg-raised);
  transition:all var(--dur-fast) var(--ease-out);
}
.nav__tool:hover{border-color:var(--accent);color:var(--accent)}
.nav__burger{display:none}
@media (max-width:760px){
  .nav__links{display:none}
  .nav__burger{display:inline-flex}
  .nav__row{gap:8px}
  .nav__tool span:nth-child(2){display:none}
}
.nav__drawer{
  position:fixed;top:60px;left:8px;right:8px;z-index:55;
  background:var(--bg-raised);border:1px solid var(--line);border-radius:14px;padding:10px;
  display:flex;flex-direction:column;gap:2px;
  animation:drawerIn 200ms var(--ease-out);
}
@keyframes drawerIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.nav__drawer .nav__link{padding:12px 14px;font-size:14px}

/* ================================================================
   HERO
================================================================ */
.hero{position:relative;padding:clamp(48px,8vw,120px) 0 clamp(40px,6vw,80px);overflow:hidden}
.hero__grid{
  position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:56px 56px;
  mask-image:radial-gradient(ellipse 80% 60% at 50% 40%,#000 30%,transparent 80%);
  -webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 40%,#000 30%,transparent 80%);
  opacity:.35;z-index:0;
}
.hero__row{
  position:relative;z-index:2;
  display:grid;grid-template-columns:minmax(0,1.15fr) minmax(280px,0.85fr);
  gap:clamp(20px,3vw,48px);align-items:center;
}
@media (max-width:880px){.hero__row{grid-template-columns:1fr}}
.kicker{font-family:var(--font-mono);font-size:11px;color:var(--ink-4);letter-spacing:.12em;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.kicker::before{content:"";display:inline-block;width:14px;height:1px;background:var(--accent)}
.hero__title{
  font-family:var(--font-display);font-weight:600;
  font-size:clamp(40px,8.6vw,108px);letter-spacing:-0.04em;line-height:.92;
  margin:14px 0 22px;text-wrap:balance;
}
.hero__title em{
  font-family:var(--font-serif);font-style:italic;font-weight:500;
  color:var(--accent);font-size:.92em;letter-spacing:-0.02em;
}
.hero__dek{font-size:clamp(14px,1.5vw,17px);color:var(--ink-2);max-width:54ch;line-height:1.6;margin:0 0 28px}
.hero__cta{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:28px}
.hero__signal{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;
  padding:14px;border:1px solid var(--line);border-radius:14px;
  background:color-mix(in oklch,var(--bg-raised) 70%,transparent);
}
.hero__chip{
  display:flex;flex-direction:column;gap:2px;padding:6px 10px;border-radius:8px;
  background:var(--bg-sunken);border:1px solid var(--line);
}
.hero__chip span{font-size:13px;color:var(--ink);font-weight:500}
.hero__chip small{font-size:10px;color:var(--ink-4);letter-spacing:.05em;text-transform:uppercase}
.hero__stage{display:flex;flex-direction:column;gap:14px;align-items:center}
.hero__arena{
  position:relative;aspect-ratio:1/1;width:min(380px,86vw);
  border:1px solid var(--line);border-radius:18px;
  background:radial-gradient(circle at 50% 40%,color-mix(in oklch,var(--accent) 18%,transparent),transparent 60%),var(--bg-raised);
  display:grid;place-items:center;overflow:hidden;
}
.hero__arena::before{
  content:"";position:absolute;inset:25%;border-radius:50%;
  background:radial-gradient(circle,var(--accent-glow),transparent 70%);
  filter:blur(20px);
  animation:breathe 6s ease-in-out infinite;
}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.hero__floor{
  position:absolute;left:8%;right:8%;bottom:8%;height:18px;border-radius:50%;
  background:radial-gradient(ellipse,color-mix(in oklch,var(--accent) 20%,transparent),transparent 70%);
  filter:blur(6px);
}
.hero__monster{position:relative;z-index:2;animation:hover 4.4s ease-in-out infinite}
@keyframes hover{0%,100%{transform:translateY(-2px)}50%{transform:translateY(-12px)}}

/* ================================================================
   BUTTONS / CHIPS
================================================================ */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--font-mono);font-size:13px;letter-spacing:.02em;
  padding:10px 16px;border-radius:8px;border:1px solid var(--line);
  background:var(--bg-raised);color:var(--ink);min-height:42px;
  transition:transform var(--dur-fast) var(--ease-out),background var(--dur-fast),border-color var(--dur-fast),box-shadow var(--dur-fast);
  position:relative;overflow:hidden;
}
.btn:hover{border-color:var(--line-strong);transform:translateY(-1px);box-shadow:0 6px 20px var(--accent-glow)}
.btn:active{transform:translateY(0)}
.btn--primary{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);font-weight:600}
.btn--primary:hover{background:var(--accent-hi);border-color:var(--accent-hi);box-shadow:0 10px 30px var(--accent-glow)}
.btn--ghost{background:transparent}
.btn--sm{padding:7px 12px;font-size:12px;min-height:34px}
.btn[disabled]{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn .arrow{display:inline-block;transition:transform var(--dur-fast) var(--ease-out)}
.btn:hover .arrow{transform:translateX(3px)}
.chip{
  font-family:var(--font-mono);font-size:11px;padding:3px 8px;border-radius:6px;
  border:1px solid var(--line);color:var(--ink-2);background:var(--bg-sunken);
}
.chip--accent{border-color:color-mix(in oklch,var(--accent) 50%,var(--line));color:var(--accent);background:color-mix(in oklch,var(--accent) 10%,transparent)}

/* ================================================================
   SECTIONS
================================================================ */
.section{padding:clamp(48px,7vw,96px) 0;position:relative}
.section--alt{background:color-mix(in oklch,var(--bg-sunken) 50%,var(--bg))}
.section__hd{
  display:grid;grid-template-columns:minmax(0,1.2fr) minmax(0,1fr);gap:24px;align-items:end;
  border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:32px;
}
@media (max-width:760px){.section__hd{grid-template-columns:1fr}}
.section__idx{font-family:var(--font-mono);font-size:11px;color:var(--ink-4);letter-spacing:.14em}
.section__title{
  font-family:var(--font-display);font-size:clamp(28px,4.5vw,56px);font-weight:600;
  letter-spacing:-0.03em;line-height:1;margin:6px 0 0;text-wrap:balance;
}
.section__copy{color:var(--ink-2);line-height:1.6;margin:0}

/* Reveal-on-scroll */
.reveal{opacity:0;transform:translateY(28px);transition:opacity 800ms var(--ease-out),transform 800ms var(--ease-out)}
.reveal.in{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}}

/* ================================================================
   PAGE-ENTER — re-runs on every route change because the wrapper
   is keyed by route. Layers a fade + lift + accent flash bar so
   navigation (or reload) feels alive without a full page wipe.
================================================================ */
.page-enter{animation:pageIn 620ms var(--ease-out) both}
@keyframes pageIn{
  0%{opacity:0;transform:translateY(18px) scale(.992);filter:blur(4px)}
  60%{filter:blur(0)}
  100%{opacity:1;transform:none;filter:none}
}
.page-enter::before{
  content:"";position:fixed;left:0;right:0;top:0;height:2px;z-index:201;pointer-events:none;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  box-shadow:0 0 18px var(--accent-glow);
  transform-origin:left;animation:pageFlash 720ms var(--ease-out) forwards;
}
@keyframes pageFlash{
  0%{transform:scaleX(0);opacity:0}
  20%{opacity:1}
  100%{transform:scaleX(1);opacity:0}
}
@media (prefers-reduced-motion:reduce){.page-enter,.page-enter::before{animation:none}}

/* ================================================================

================================================================ */

.pd-hero{padding:48px 0 32px}
.pd-hero__row{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(280px,1fr);gap:32px;align-items:start}

.pd-title{font-family:var(--font-display);font-size:clamp(40px,6vw,72px);font-weight:600;letter-spacing:-0.04em;line-height:1;margin:8px 0 16px;text-wrap:balance}

================================================================ */
.blog-cols{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}

}
.post-card:hover{transform:translateY(-3px);border-color:color-mix(in oklch,var(--accent) 50%,var(--line));box-shadow:0 14px 36px var(--accent-glow)}
.post-card__meta{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-4);letter-spacing:.08em;text-transform:uppercase}
.post-card h3{font-family:var(--font-serif);font-size:20px;font-weight:600;line-height:1.18;margin:0;text-wrap:balance}
.post-card p{font-family:var(--font-serif);font-size:14px;color:var(--ink-3);font-style:italic;line-height:1.4;margin:0}

.post-reader{max-width:var(--reading-w);margin:0 auto;padding:48px 0}

.post-reader .meta{font-size:11px;color:var(--ink-4);letter-spacing:.1em;text-transform:uppercase;display:flex;gap:14px;margin-bottom:24px}
.post-reader .body{font-family:var(--font-serif);font-size:18px;line-height:1.7;color:var(--ink)}
.post-reader .body h2{font-family:var(--font-display);font-size:28px;font-weight:600;letter-spacing:-0.02em;margin:36px 0 14px}
.post-reader .body h3{font-family:var(--font-display);font-size:22px;font-weight:600;letter-spacing:-0.01em;margin:28px 0 10px}

.post-reader .body blockquote{

/* HN feed */
.hn-list{display:flex;flex-direction:column;gap:8px}

.hn-item__rank{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--ink-4);min-width:28px}
.hn-item__title{font-family:var(--font-mono);font-size:13px;color:var(--ink);line-height:1.35}
.hn-item__title small{display:block;font-size:11px;color:var(--ink-4);margin-top:3px;letter-spacing:.06em;text-transform:uppercase}
.hn-item__pts{font-family:var(--font-display);font-size:14px;color:var(--accent);font-weight:600}

/* Editor */
.editor{
  position:fixed;inset:0;z-index:200;background:color-mix(in oklch,var(--bg) 92%,transparent);
  backdrop-filter:blur(12px);display:flex;flex-direction:column;
}
.editor__bar{

.editor__body{

.editor__pane{padding:18px clamp(16px,3vw,32px);overflow:auto}
.editor__pane--write{border-right:1px solid var(--line);background:var(--bg-sunken)}

.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-family:var(--font-mono);font-size:11px;color:var(--ink-4);letter-spacing:.08em;text-transform:uppercase}
.field input,.field textarea,.field select{

.field textarea{font-family:var(--font-mono);font-size:14px;line-height:1.55;min-height:300px;resize:vertical}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent)}

   CONTACT
================================================================ */
.contact-grid{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(0,1fr);gap:32px;align-items:start}
@media (max-width:880px){.contact-grid{grid-template-columns:1fr}}
.contact-form{display:flex;flex-direction:column;gap:14px}
.contact-side{padding:24px;border:1px solid var(--line);border-radius:18px;background:var(--bg-raised);display:flex;flex-direction:column;gap:14px}

.contact-link:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}

.contact-slot{

/* ================================================================
   CURSOR FX — shape changes per mode
================================================================ */
.cursor-dot,.cursor-ring{position:fixed;top:0;left:0;pointer-events:none;z-index:9999;will-change:transform;transition:opacity 200ms, width 220ms var(--ease-out), height 220ms var(--ease-out), border-radius 220ms var(--ease-out), background 220ms, border-color 220ms, transform 16ms linear}
.cursor-dot{width:8px;height:8px;background:var(--accent);box-shadow:0 0 12px var(--accent-glow);mix-blend-mode:plus-lighter;border-radius:50%}
.cursor-ring{width:34px;height:34px;border:1.5px solid color-mix(in oklch,var(--accent) 60%,transparent);border-radius:50%}
.cursor-ring[data-hover="on"]{border-color:var(--accent);background:color-mix(in oklch,var(--accent) 14%,transparent);width:54px;height:54px}

/* ----------------------------------------------------------------
   CURSOR CONTRAST — accent sits at oklch(0.72), bright on dark
   surfaces but vanishes on near-white. Fix: in LIGHT mode, swap
   the dot/ring to dark ink with a soft halo so it reads against
   both white pages and accent-tinted surfaces. Also add a faint
   ink ring around the dot in dark mode as a backstop against
   light-tinted hover states.
   ---------------------------------------------------------------- */
.cursor-dot{
  outline:1px solid color-mix(in oklch, var(--ink) 35%, transparent);
  outline-offset:0;
}
html[data-mode="light"] .cursor-dot{
  background:var(--ink);
  box-shadow:0 0 0 2px color-mix(in oklch, var(--bg) 65%, transparent), 0 0 12px color-mix(in oklch, var(--ink) 25%, transparent);
  mix-blend-mode:normal;
  outline:none;
}
html[data-mode="light"] .cursor-ring{
  border-color:color-mix(in oklch, var(--ink) 50%, transparent);
  background:color-mix(in oklch, var(--bg) 30%, transparent);
}
html[data-mode="light"] .cursor-ring[data-hover="on"]{
  border-color:var(--accent);
  background:color-mix(in oklch, var(--accent) 14%, var(--bg));
}
html[data-mode="light"][data-cursor="pixel"] .cursor-dot,
html[data-mode="light"][data-cursor="blade"] .cursor-dot,
html[data-mode="light"][data-cursor="terminal"] .cursor-dot{background:var(--ink);box-shadow:0 0 8px color-mix(in oklch, var(--ink) 30%, transparent)}
html[data-mode="light"][data-cursor="spark"] .cursor-dot{background:var(--ink);box-shadow:0 0 6px var(--ink),0 0 14px var(--accent),0 0 24px var(--accent-glow)}
html[data-mode="light"][data-cursor="nova"] .cursor-dot::before,
html[data-mode="light"][data-cursor="nova"] .cursor-dot::after,
html[data-mode="light"][data-cursor="crosshair"] .cursor-dot::before,
html[data-mode="light"][data-cursor="crosshair"] .cursor-dot::after{background:var(--ink)}
html[data-mode="light"][data-cursor="crosshair"] .cursor-dot{border-color:var(--ink)}
html[data-mode="light"] .cursor-ripple{background:var(--ink)}

/* Per-mode SHAPES — set by data-cursor on <html> */
[data-cursor="comet"] .cursor-dot{border-radius:50%;width:10px;height:10px}
[data-cursor="comet"] .cursor-ring{border-radius:50%}

[data-cursor="pixel"] .cursor-dot{border-radius:0;width:10px;height:10px;mix-blend-mode:normal;box-shadow:0 0 0 2px color-mix(in oklch,var(--accent) 30%,transparent)}
[data-cursor="pixel"] .cursor-ring{border-radius:2px;border-style:dashed;border-color:color-mix(in oklch,var(--accent) 70%,transparent);width:28px;height:28px}
[data-cursor="pixel"] .cursor-ring[data-hover="on"]{width:44px;height:44px;border-style:solid}

[data-cursor="nova"] .cursor-dot{width:12px;height:12px;background:transparent;box-shadow:none;border-radius:0}
[data-cursor="nova"] .cursor-dot::before,[data-cursor="nova"] .cursor-dot::after{
  content:"";position:absolute;left:50%;top:50%;background:var(--accent);box-shadow:0 0 10px var(--accent-glow);
}
[data-cursor="nova"] .cursor-dot::before{width:14px;height:2px;transform:translate(-50%,-50%)}
[data-cursor="nova"] .cursor-dot::after{width:2px;height:14px;transform:translate(-50%,-50%)}
[data-cursor="nova"] .cursor-ring{border-radius:50%;border-style:dotted;width:38px;height:38px}

[data-cursor="ribbon"] .cursor-dot{width:14px;height:6px;border-radius:999px;transform-origin:center}
[data-cursor="ribbon"] .cursor-ring{border-radius:999px;width:46px;height:18px}
[data-cursor="ribbon"] .cursor-ring[data-hover="on"]{width:66px;height:22px}

[data-cursor="spark"] .cursor-dot{width:6px;height:6px;border-radius:50%;background:#fff;box-shadow:0 0 6px #fff,0 0 14px var(--accent),0 0 24px var(--accent-glow)}
[data-cursor="spark"] .cursor-ring{display:none}

[data-cursor="blade"] .cursor-dot{width:2px;height:22px;border-radius:1px;background:var(--accent);box-shadow:0 0 10px var(--accent-glow)}
[data-cursor="blade"] .cursor-ring{width:30px;height:30px;border-radius:0;transform-origin:center;border-color:color-mix(in oklch,var(--accent) 50%,transparent)}

[data-cursor="terminal"] .cursor-dot{width:10px;height:18px;border-radius:1px;background:var(--accent);box-shadow:0 0 8px var(--accent-glow);animation:blinkCursor .9s steps(2,end) infinite}
[data-cursor="terminal"] .cursor-ring{display:none}
@keyframes blinkCursor{50%{opacity:.15}}

[data-cursor="crosshair"] .cursor-dot{width:18px;height:18px;background:transparent;box-shadow:none;border-radius:50%;border:1px solid var(--accent)}
[data-cursor="crosshair"] .cursor-dot::before,[data-cursor="crosshair"] .cursor-dot::after{
  content:"";position:absolute;left:50%;top:50%;background:var(--accent);
}
[data-cursor="crosshair"] .cursor-dot::before{width:24px;height:1px;transform:translate(-50%,-50%)}
[data-cursor="crosshair"] .cursor-dot::after{width:1px;height:24px;transform:translate(-50%,-50%)}
[data-cursor="crosshair"] .cursor-ring{display:none}

.cursor-ripple{position:fixed;width:8px;height:8px;border-radius:50%;background:var(--accent);pointer-events:none;z-index:9998;animation:ripple 560ms cubic-bezier(0.22,1,0.36,1) forwards}
@keyframes ripple{to{transform:translate(-50%,-50%) scale(8);opacity:0}from{transform:translate(-50%,-50%) scale(1);opacity:.6}}
#cursor-canvas{position:fixed;inset:0;pointer-events:none;z-index:9997;max-width:none!important}
/* When a custom cursor is active, hide the system cursor over EVERY element
   (buttons, links, inputs all set their own cursor and would otherwise win). */
html[data-cursor]:not([data-cursor="off"]),
html[data-cursor]:not([data-cursor="off"]) *{cursor:none!important}
@media (hover:none){.cursor-dot,.cursor-ring,#cursor-canvas{display:none}}

/* ================================================================
   MODAL / TWEAKS
================================================================ */
.modal-bg{position:fixed;inset:0;background:color-mix(in oklch,var(--bg) 70%,transparent);backdrop-filter:blur(20px);z-index:100;display:grid;place-items:center;padding:20px;animation:fadeIn 200ms var(--ease-out)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg-raised);border:1px solid var(--line);border-radius:18px;padding:28px;max-width:520px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.5);animation:modalIn 400ms var(--ease-out)}
@keyframes modalIn{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}
.tweaks{
  position:fixed;right:18px;bottom:18px;z-index:120;width:320px;max-width:calc(100vw - 36px);
  border:1px solid var(--line);border-radius:14px;background:var(--bg-raised);
  box-shadow:0 20px 60px rgba(0,0,0,.4);overflow:hidden;
}
.tweaks__bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line);background:var(--bg-sunken)}
.tweaks__bar h3{font-family:var(--font-display);font-size:14px;font-weight:600;margin:0;letter-spacing:-0.01em}
.tweaks__body{padding:14px 16px;display:flex;flex-direction:column;gap:14px;max-height:60vh;overflow:auto}
.tw-row{display:flex;flex-direction:column;gap:6px}
.tw-row__lbl{font-family:var(--font-mono);font-size:11px;color:var(--ink-4);letter-spacing:.08em;text-transform:uppercase}
.tw-seg{display:grid;grid-auto-flow:column;grid-auto-columns:1fr;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.tw-seg button{padding:7px 8px;font-size:12px;border-right:1px solid var(--line);background:var(--bg-sunken);color:var(--ink-3)}
.tw-seg button:last-child{border-right:0}
.tw-seg button[aria-pressed="true"]{background:var(--accent);color:var(--accent-ink)}
.tw-swatch{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.tw-swatch button{
  aspect-ratio:1/1;border-radius:10px;border:2px solid transparent;
  background:oklch(0.72 0.18 var(--h));position:relative;--h:275;
  min-height:38px;box-shadow:0 0 0 1px color-mix(in oklch,oklch(0.72 0.18 var(--h)) 30%,transparent);
  transition:transform var(--dur-fast) var(--ease-out),box-shadow var(--dur-fast) var(--ease-out);
}
.tw-swatch button:hover{transform:translateY(-2px) scale(1.06);box-shadow:0 6px 18px color-mix(in oklch,oklch(0.72 0.18 var(--h)) 45%,transparent)}
.tw-swatch button[aria-pressed="true"]{border-color:var(--ink);box-shadow:0 0 0 2px var(--bg),0 0 0 4px oklch(0.72 0.18 var(--h)),0 8px 22px color-mix(in oklch,oklch(0.72 0.18 var(--h)) 50%,transparent)}
.tw-themes{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.tw-themes button{
  display:flex;flex-direction:column;align-items:flex-start;gap:6px;
  padding:10px;border-radius:10px;border:1px solid var(--line);background:var(--bg-sunken);
  font-family:var(--font-mono);font-size:11px;color:var(--ink-3);letter-spacing:.04em;
  transition:all var(--dur-fast) var(--ease-out);position:relative;overflow:hidden;
}
.tw-themes button:hover{border-color:color-mix(in oklch,var(--accent) 50%,var(--line));color:var(--ink);transform:translateY(-1px)}
.tw-themes button[aria-pressed="true"]{border-color:var(--accent);background:color-mix(in oklch,var(--accent) 10%,var(--bg-sunken));color:var(--ink)}
.tw-themes__chips{display:flex;gap:4px}
.tw-themes__chips i{display:block;width:14px;height:14px;border-radius:4px;border:1px solid color-mix(in oklch,var(--ink) 20%,transparent)}
.tw-toggle{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12px}
.tw-switch{width:36px;height:20px;border-radius:10px;background:var(--bg-sunken);border:1px solid var(--line);position:relative;cursor:pointer;transition:background var(--dur-fast)}
.tw-switch[aria-pressed="true"]{background:var(--accent);border-color:var(--accent)}
.tw-switch::after{content:"";position:absolute;top:1px;left:1px;width:16px;height:16px;border-radius:50%;background:var(--ink);transition:transform var(--dur-fast) var(--ease-out)}
.tw-switch[aria-pressed="true"]::after{transform:translateX(16px);background:var(--accent-ink)}

/* ================================================================
   FOOTER
================================================================ */
.footer{
  border-top:1px solid var(--line);margin-top:64px;padding:32px 0;
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px;
  font-size:12px;color:var(--ink-4);letter-spacing:.05em;
}
.footer a,.footer button{color:inherit;font:inherit;letter-spacing:inherit;cursor:pointer}

/* Owner badge */

.hero__statusline{

/* ================================================================

================================================================ */
.stack-strip{

/* ================================================================

================================================================ */
.cursor-lab{

}
@media (max-width:780px){.cursor-lab{grid-template-columns:repeat(2,1fr)}}
.cursor-lab__tile{

.section--tape{

}
.section--tape::before{

  padding:3px 8px;border-radius:999px;

}

================================================================ */

.hero__title em::after{

/* ================================================================
   STUDY LAB
================================================================ */
.study__controls{
  display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;align-items:center;
  margin-bottom:24px;padding:14px;border:1px solid var(--line);border-radius:14px;background:var(--bg-raised);
}
.study__pills{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.study__pill{

  padding:6px 10px;border-radius:8px;background:var(--bg-sunken);
  border:1px solid var(--line);color:var(--ink-3);
  transition:all var(--dur-fast) var(--ease-out);
}
.study__pill:hover{color:var(--ink);border-color:var(--line-strong)}
.study__pill[aria-pressed="true"]{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.study__pill--course{font-style:italic;color:var(--ink-2)}
.study__sep{color:var(--ink-4);padding:0 4px}
.study__searchwrap{display:flex;gap:8px;align-items:center}
.study__search{

.study__card{

}
.study__card:hover{transform:translateY(-3px);border-color:var(--k-edge);box-shadow:0 14px 36px color-mix(in oklch,var(--k-color) 30%,transparent)}
.study__card::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:4px;

}
.study__cardlink{display:flex;flex-direction:column;gap:10px;padding:18px 18px 16px 22px;color:inherit;height:100%}
.study__cardhd{display:flex;justify-content:space-between;align-items:center;gap:8px}
.study__kind{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--k-color);padding:3px 8px;border-radius:999px;

}
.study__course{
  font-family:var(--font-mono);font-size:10px;color:var(--ink-4);letter-spacing:.08em;
}
.study__title{font-family:var(--font-display);font-size:18px;font-weight:600;letter-spacing:-0.01em;margin:0;line-height:1.25}
.study__note{font-family:var(--font-serif);font-style:italic;font-size:13px;color:var(--ink-3);line-height:1.45;margin:0}
.study__foot{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:8px;gap:8px}
.study__tags{display:flex;gap:4px;flex-wrap:wrap}
.study__date{font-family:var(--font-mono);font-size:10px;color:var(--ink-4);letter-spacing:.06em;flex-shrink:0}
.study__ops{

.study__empty{

   ABOUT

.scrollprog{

  background:linear-gradient(90deg,var(--accent),var(--accent-hi));

  transform:scaleX(var(--sp,0));
  box-shadow:0 0 12px var(--accent-glow);

}
/* Scroll-following accent halo: removed by request — kept the class so JS still has a
   target to set --y on, but display:none stops it rendering. */

/* ================================================================
   SCROLL HINT (hero) — gentle nudge to scroll
   Lives BELOW the hero content (centered, in-flow) so it never
   overlaps the signal chips or the monster panel.

.scrollhint{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;

}
@media (max-width:880px){.scrollhint{display:none}}
.scrollhint__line{

}
.scrollhint__line::after{
  content:"";position:absolute;left:-1px;top:-8px;width:3px;height:8px;background:var(--accent);
  border-radius:2px;box-shadow:0 0 8px var(--accent-glow);
  animation:scrollHintDrop 2.4s var(--ease-out) infinite;
}
@keyframes scrollHintDrop{
  0%{transform:translateY(0);opacity:0}
  20%{opacity:1}
  90%{opacity:0}
  100%{transform:translateY(44px);opacity:0}
}

/* ================================================================
   STAGGERED REVEALS — children animate in sequence
   Apply class `reveal-stagger` to a container; its `.reveal`
   children get incremental delays based on --i (0..n) inline.
================================================================ */
.reveal-stagger .reveal{transition-delay:calc(var(--i,0) * 60ms)}

/* ================================================================
   SECTION INDEX SIDEBAR (long pages)
   Floats vertically on the right; auto-highlights current section
   via IntersectionObserver wired from JS.
================================================================ */
.sectionidx{
  position:fixed;right:18px;top:50%;transform:translateY(-50%);z-index:40;
  display:flex;flex-direction:column;gap:10px;pointer-events:auto;
}
@media (max-width:980px){.sectionidx{display:none}}
.sectionidx__dot{
  width:6px;height:6px;border-radius:50%;background:var(--line-strong);
  border:0;padding:0;cursor:pointer;position:relative;
  transition:all var(--dur-fast) var(--ease-out);
}
.sectionidx__dot::after{
  content:attr(data-label);position:absolute;right:18px;top:50%;transform:translateY(-50%);
  font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-3);background:var(--bg-raised);border:1px solid var(--line);
  padding:3px 8px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;
  transition:opacity var(--dur-fast);
}
.sectionidx__dot:hover{background:var(--accent);transform:scale(1.4)}
.sectionidx__dot:hover::after{opacity:1}
.sectionidx__dot[aria-current="true"]{background:var(--accent);box-shadow:0 0 12px var(--accent-glow);width:8px;height:8px}

/* ================================================================
   PARALLAX MONSTER (project cards) — gentle drift on hover
================================================================ */
.proj-card__monster canvas{
  transition:transform 600ms var(--ease-out);
  will-change:transform;
}
.proj-card:hover .proj-card__monster canvas{transform:translateY(-4px) scale(1.04)}

/* ================================================================
   HOVER POP for chips
================================================================ */
.chip{transition:transform var(--dur-fast) var(--ease-out), background var(--dur-fast), border-color var(--dur-fast)}
.chip:hover{transform:translateY(-1px);border-color:color-mix(in oklch,var(--accent) 40%,var(--line));color:var(--ink)}

/* ================================================================
   SECTION HD — numbered ticket + tape
================================================================ */
.section__hd{position:relative}
.section__idx{
  display:inline-flex;align-items:center;gap:8px;
  padding:3px 10px 3px 0;
}
.section__idx::before{
  content:"";display:inline-block;width:24px;height:1px;background:var(--accent);
}

/* ================================================================
   NAV ELEVATION when scrolled
================================================================ */
.nav[data-scrolled="true"]{
  box-shadow:0 8px 30px rgba(0,0,0,.25);
  background:color-mix(in oklch,var(--bg) 94%,transparent);
}

/* ================================================================
   MICRO ANIMATIONS — sparkle behind hero title
================================================================ */
.hero__title em{position:relative}
.hero__title em::before{
  content:"";position:absolute;left:-12%;top:-8%;right:-12%;bottom:-8%;
  background:radial-gradient(ellipse,var(--accent-glow),transparent 60%);
  z-index:-1;opacity:.4;filter:blur(20px);
  animation:emGlow 5s ease-in-out infinite;
}
@keyframes emGlow{0%,100%{opacity:.3;transform:scale(.95)}50%{opacity:.6;transform:scale(1.05)}}
</style>

   body:`LEAD: Every press release is about a bigger model. Every interesting engineering story is about a smaller one.

In the last six months, three shifts have compounded: NPUs in every mid-range phone, quantization that actually preserves behavior below 4 bits, and inference runtimes that finally respect memory hierarchy. Individually, each is a footnote. Together they change what an application can assume about its environment.

## What changed, concretely

A year ago, running a competent 7B model on a $200 SBC was a party trick — minutes to first token, RAM pinned, thermal throttling inside of a paragraph. Today it is *routine*, and the bottleneck has moved to storage bandwidth, which is a much more tractable problem.

- Mixed-precision kernels that downshift at runtime under thermal pressure without model reload.
- KV-cache paging over NVMe with prefetch hints from the decoder's own attention pattern.
- Tokenizer fast-paths that skip Python entirely — often the biggest single win.

> The most interesting inference work of 2026 fits on a device you can put in your pocket.

## What to watch

The sleeper trend is *locality-aware routing*: fleets of tiny models that hand queries to each other based on context, with a larger model invoked only as a fallback. The economics are brutal — a $0.02 API call collapses to nearly zero when 80% of it runs on-device.

### My bet

Within eighteen months, the default assumption for a consumer ML feature will be that it runs locally, and calling out to a server will be the exception that demands justification.`},
  {id:"latency-as-ux",category:"ai",title:"Latency is the new UX",dek:"Below 100ms, interfaces feel like thought. Above it, they feel like websites.",date:"2026-04-05",readMin:"5 min",tags:["ux","inference"],
   body:`LEAD: There is a line, somewhere around the blink rate, below which software stops feeling like software.

It is the reason local-first apps feel faster than their cloud equivalents even when the cloud one is, on paper, more capable. It is the reason streaming tokens matters more than total throughput. It is why I have mostly given up on apps that put a network round-trip between me and the thing I asked for.

## The 100ms budget

You have roughly a hundred milliseconds to respond to an input before the user's attention starts to audit you. Not finish — just respond. A skeleton, a cursor, a character, anything. This is old news in game dev and new news in LLM-land.`},
  {id:"market-making-rewrite",category:"quant",title:"I rewrote my market-maker in Rust. Here's what I learned.",dek:"Spoiler: the wins weren't where I expected.",date:"2026-03-28",readMin:"12 min",tags:["rust","hft"],
   body:`LEAD: Every rewrite post has the same arc, and this one is no exception, except for the parts that were surprising.

The conventional wisdom says: rewrite in Rust for performance. In my case the performance gains were real but modest — maybe 1.3× on the hot path. The real wins were elsewhere.

## Borrow checker as type designer

Forced to think about ownership of an order from creation to acknowledgement, I discovered my Python code was implicitly moving orders through at least four owners with no clear handoff. The Rust rewrite made that a compile error. I caught two latent race conditions this way before writing a single test.`},

    body:`A retrieval-augmented generation engine that runs natively in C++, accelerated by Intel OpenVINO. Designed for low-latency multimodal search across text, image, and audio embeddings without a Python runtime in the hot path.\n\n— BY THE NUMBERS —\nembedding dim: 384\nretrieval p50: ~6 ms\nindex: USearch HNSW\nruntime: OpenVINO CPU\n\n— WHY C++ —\nMost multimodal RAG stacks assume Python and a stack of model-serving daemons. OvaSearch is a single binary that wires VLMPipeline, TextEmbeddingPipeline, and LLMPipeline from OpenVINO directly, with a custom ImageAllocator for zero-copy image ingestion. No framework tax, no Python hop — which matters when you actually run this on a laptop.\n\n— INDEXING SHAPE —\nText and PDFs flow through a sliding-window chunker (1000 characters, 200 overlap). Images are captioned once by a Qwen2-VL pipeline and then chunked like any other document. A flat-file cache stores chunks, embeddings, and sources so cold-start reads are deterministic.\n\n— HOT PATH (sketch) —\n  // Retrieve top-k by cosine, then assemble context for the LLM\n  auto query = embed(question);                    // bge-small-en-v1.5 via OpenVINO\n  auto hits  = index.search(query, /*top_k=*/5);   // USearch HNSW\n  for (auto& h : hits) {\n    if (h.distance > 0.45f) continue;              // relevance floor\n    ctx.append(store.chunk_at(h.key), store.source_of(h.key));\n  }\n  llm.stream(build_prompt(ctx, question));         // Llama-3.2-3B INT4\n\n— WHAT'S NEXT —\nVideo + audio ingestion via keyframe sampling and whisper.cpp, hybrid lexical + semantic retrieval with BM25 + RRF, and an NPU/GPU switch for AIPC deployment. GSoC 2026 with OpenVINO is the through-line.`},

const _MI = Object.fromEntries(window.__MONSTERS.map(m=>[m.id,m]));
const _active = new Set();
function _motion(){return parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--motion"))||1}
function _phase(m,now,hover){const mo=Math.max(.35,_motion());const sp=(m.speed||180)/(hover?1.35:1)/mo;return [0,1,2,1][Math.floor(now/sp)%4]}
function _off(m,x,y,phase){let dx=0,dy=0;for(const z of m.zones||[]){if(z.rows&&!z.rows.includes(y))continue;if(z.xMin!=null&&x<z.xMin)continue;if(z.xMax!=null&&x>z.xMax)continue;dx+=z.dx?.[phase]||0;dy+=z.dy?.[phase]||0}return [dx,dy]}
function _cell(m,x,y){const r=m.pixels[y];return r&&r[x]&&r[x]!=="."?r[x]:null}
// Resolve --accent (which is oklch(... var(--accent-h))) to a canvas-safe rgb() string.
// getComputedStyle on the root returns the unresolved var() chain, which canvas rejects.
let _accCache="",_accT=0;
function _resolveAccent(){
  const now=performance.now();
  if(_accCache&&now-_accT<500)return _accCache;
  try{
    const el=document.createElement("i");
    el.style.cssText="display:none;color:var(--accent)";
    document.body.appendChild(el);
    _accCache=getComputedStyle(el).color||"#9b6cff";
    el.remove();
  }catch(e){_accCache="#9b6cff"}
  _accT=now;
  return _accCache;
}
function _draw(ctx,m,now,hover,px){
  const mot=_motion();const grid=m.pixels[0].length;const phase=_phase(m,now,hover);const dim=grid*px;ctx.clearRect(0,0,dim,dim);
  if(document.documentElement.getAttribute("data-monsters")==="off")return;
  let oy=0,sy=1,rot=0;
  if(mot>0){
    if(m.idle==="hover"){oy=Math.sin(now*.0042)*2.4;sy=1+Math.sin(now*.0038)*.03}
    else if(m.idle==="flutter"){oy=Math.sin(now*.0062)*1.8;rot=Math.sin(now*.0045)*.03}
    else if(m.idle==="stomp"){oy=[0,.4,1.2,.4][phase];sy=[1,.985,.96,.985][phase]}
    else if(m.idle==="drift"){oy=Math.sin(now*.0034)*2.0;rot=Math.sin(now*.0032)*.03}
    else if(m.idle==="blink"){oy=Math.sin(now*.0041)*1.2}
    else{oy=Math.sin(now*.005)*.9}
  }
  if(hover){oy-=2.4;rot+=.02}
  const cx=dim/2;const sw=Math.round(grid*px*.5*(mot>0?[1,.94,.88,.94][phase]:1)*(hover?.92:1));const sh=Math.max(2,Math.round(grid*px*.1));const sy2=grid*px-Math.round(1.2*px);
  // soft elliptical shadow
  ctx.save();ctx.fillStyle="rgba(0,0,0,.30)";ctx.beginPath();ctx.ellipse(cx,sy2+sh/2,sw*.5,sh*.7,0,0,Math.PI*2);ctx.fill();ctx.restore();

  ctx.save();ctx.translate(cx,cx);if(rot)ctx.rotate(rot);ctx.scale(1,sy);ctx.translate(-cx,-cx+oy);

  // ambient accent halo (richer than rect)
  if(m.glow){
    try{
      const acc=_resolveAccent();
      const g=ctx.createRadialGradient(cx,cx,grid*px*.15,cx,cx,grid*px*.55);
      g.addColorStop(0,acc);g.addColorStop(1,"transparent");
      ctx.save();ctx.globalAlpha=m.glow*.55;ctx.globalCompositeOperation="lighter";ctx.fillStyle=g;ctx.fillRect(0,0,grid*px,grid*px);ctx.restore();
    }catch(e){}
  }

  const blink=mot>0&&((m.idle==="blink"&&now%2800<160)||(hover&&now%2200<120));
  const breath=mot>0?Math.sin(now*.003)*.06+1:1;

  // Pass 1: base body fill with cel-shaded sub-cell detail (each grid cell -> 4 sub-pixels)
  for(let y=0;y<grid;y++){
    const row=m.pixels[y]||"";
    for(let x=0;x<grid;x++){
      const ch=row[x];if(!ch||ch===".")continue;
      const baseColor=blink&&ch==="E"?m.palette.L:m.palette[ch];if(!baseColor)continue;
      const [dx,dy]=mot>0?_off(m,x,y,phase):[0,0];
      const px0=(x+dx)*px,py0=(y+dy)*px,h=px/2;
      // base
      ctx.fillStyle=baseColor;ctx.fillRect(px0,py0,px,px);
      // top-left highlight + bottom-right shadow (cel shading)
      if(ch==="B"||ch==="S"||ch==="A"||ch==="H"){
        ctx.fillStyle="rgba(255,255,255,.16)";ctx.fillRect(px0,py0,px,h);
        ctx.fillStyle="rgba(0,0,0,.18)";ctx.fillRect(px0,py0+h,px,h);
      }
      // scale/plate stripe for S
      if(ch==="S"){ctx.fillStyle="rgba(0,0,0,.22)";ctx.fillRect(px0,py0+px-Math.max(1,h*.5),px,Math.max(1,h*.5))}
      // accent (A) gets bright top spark
      if(ch==="A"){ctx.fillStyle="rgba(255,255,255,.42)";ctx.fillRect(px0+h*.5,py0,h,h*.7)}
      // highlight (H) glows
      if(ch==="H"){ctx.fillStyle="rgba(255,255,255,.30)";ctx.fillRect(px0,py0,px,h*.6)}
    }
  }
  // Pass 2: outline — darken outer-edge cells where neighbor is empty (fang/silhouette definition)
  ctx.fillStyle=m.palette.L||"rgba(0,0,0,.55)";
  for(let y=0;y<grid;y++){
    for(let x=0;x<grid;x++){
      const ch=_cell(m,x,y);if(!ch||ch==="L")continue;
      const [dx,dy]=mot>0?_off(m,x,y,phase):[0,0];
      const px0=(x+dx)*px,py0=(y+dy)*px;
      // bottom edge if cell below empty
      if(!_cell(m,x,y+1))ctx.fillRect(px0,py0+px-1,px,1);
      // right edge if cell right empty
      if(!_cell(m,x+1,y))ctx.fillRect(px0+px-1,py0,1,px);
      // top edge highlight inverse — use thin dark line for crisp silhouette top
      if(!_cell(m,x,y-1)){ctx.save();ctx.globalAlpha=.5;ctx.fillRect(px0,py0,px,1);ctx.restore()}
      if(!_cell(m,x-1,y)){ctx.save();ctx.globalAlpha=.5;ctx.fillRect(px0,py0,1,px);ctx.restore()}
    }
  }
  // Pass 3: eye glints + accent sparkles (dynamic)
  if(!blink){
    const acc=_resolveAccent();
    for(let y=0;y<grid;y++)for(let x=0;x<grid;x++){
      if(_cell(m,x,y)!=="E")continue;
      const [dx,dy]=mot>0?_off(m,x,y,phase):[0,0];
      const px0=(x+dx)*px,py0=(y+dy)*px;
      // bright glint (top-left quarter)
      ctx.fillStyle="rgba(255,255,255,.95)";ctx.fillRect(px0+1,py0+1,Math.max(1,px*.35),Math.max(1,px*.35));
    }
    // pulsing accent ember on A cells
    if(mot>0){
      const pulse=.4+Math.sin(now*.005)*.4;
      for(let y=0;y<grid;y++)for(let x=0;x<grid;x++){
        if(_cell(m,x,y)!=="A")continue;
        const [dx,dy]=mot>0?_off(m,x,y,phase):[0,0];
        try{ctx.save();ctx.globalAlpha=pulse*.6;ctx.globalCompositeOperation="lighter";ctx.fillStyle=acc;
        ctx.fillRect((x+dx)*px-px*.2,(y+dy)*px-px*.2,px*1.4,px*1.4);ctx.restore();}catch(e){}
      }
    }
  }
  // breathing scale on idle
  if(breath!==1&&mot>0){/* breathing already applied via sy */}
  ctx.restore();
}
function _tick(now){
  try{
    for(const c of _active){
      if(!document.contains(c)){_active.delete(c);c.__mounted=false;continue}
      const m=_MI[c.dataset.monster];if(!m||!c.__ctx)continue;
      try{_draw(c.__ctx,m,now,c.__hover,c.__px)}catch(e){console.warn('[MonsterRenderer] draw error:',e)}
    }
  }catch(e){}
  requestAnimationFrame(_tick);
}
requestAnimationFrame(_tick);
function _mount(canvas){
  if(canvas.__mounted)return;
  const m=_MI[canvas.dataset.monster];if(!m)return;
  const grid=m.pixels[0].length;const size=parseInt(canvas.dataset.size||"96",10);const px=Math.max(3,Math.floor(size/grid));const dim=px*grid;const dpr=Math.max(2,window.devicePixelRatio||1);
  canvas.width=dim*dpr;canvas.height=dim*dpr;canvas.style.width=dim+"px";canvas.style.height=dim+"px";canvas.style.imageRendering="auto";
  const ctx=canvas.getContext("2d");ctx.imageSmoothingEnabled=false;ctx.setTransform(dpr,0,0,dpr,0,0);
  canvas.__ctx=ctx;canvas.__px=px;canvas.__hover=false;canvas.__mounted=true;
  canvas.addEventListener("mouseenter",()=>{canvas.__hover=true});
  canvas.addEventListener("mouseleave",()=>{canvas.__hover=false});
  _active.add(canvas);
}
window.MonsterRenderer={mount:_mount,mountAll:(root=document)=>root.querySelectorAll("canvas[data-monster]").forEach(_mount),MONSTERS:window.__MONSTERS,INDEX:_MI};
window.__resolveAccent=_resolveAccent;
</script>

<!-- =============================================================

============================================================= -->
<script>
(function(){
  if (window.matchMedia('(hover: none)').matches) return;
  const dot = document.createElement('div'); dot.className = 'cursor-dot'; document.body.appendChild(dot);
  const ring = document.createElement('div'); ring.className = 'cursor-ring'; document.body.appendChild(ring);
  let tx=0,ty=0,rx=0,ry=0,vis=false;
  const INT='a,button,[role=button],.proj-card,.post-card,.hn-item,.contact-link,.hero__chip,.btn,.nav__link,.nav__tool,canvas[data-monster]';

  const cv = document.getElementById('cursor-canvas');
  const cx = cv.getContext('2d');
  function resize(){const dpr=Math.max(1,devicePixelRatio||1);cv.width=innerWidth*dpr;cv.height=innerHeight*dpr;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx.setTransform(dpr,0,0,dpr,0,0)}
  resize();window.addEventListener('resize',resize,{passive:true});

  const particles=[];let lastX=0,lastY=0,heading=0;
  function emit(x,y,style){
    if(style==='off')return;
    let accent='#9b6cff';
    try{accent=window.__resolveAccent?.()||accent;}catch(e){}
    const dx=x-lastX,dy=y-lastY,sp=Math.hypot(dx,dy);lastX=x;lastY=y;
    if(sp>0.2)heading=Math.atan2(dy,dx);
    if(style==='comet'){
      for(let i=0;i<3;i++)particles.push({x:x+(Math.random()-.5)*4,y:y+(Math.random()-.5)*4,vx:-dx*.04+(Math.random()-.5)*.4,vy:-dy*.04+(Math.random()-.5)*.4+.2,r:Math.random()*2.2+1.6,life:1,decay:.022,c:accent,style});
    }else if(style==='pixel'){
      const g=4;particles.push({x:Math.round(x/g)*g,y:Math.round(y/g)*g,vx:0,vy:.6,r:g,life:1,decay:.05,c:accent,style});
    }else if(style==='nova'){
      for(let i=0;i<4;i++){const a=Math.random()*Math.PI*2,v=.8+Math.random()*1.6;particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,r:Math.random()*2.4+1.2,life:1,decay:.028,c:accent,style})}
    }else if(style==='ribbon'){
      particles.push({x,y,vx:dx*.05,vy:dy*.05,r:7,life:1,decay:.022,c:accent,style});
    }else if(style==='spark'){
      const n=Math.min(6,1+Math.floor(sp/4));
      for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,v=2+Math.random()*3;particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-.3,r:1.4,life:1,decay:.06,c:accent,style})}
    }else if(style==='blade'){
      // crisp slash arc behind cursor
      const a=heading;const back=10;
      particles.push({x:x-Math.cos(a)*back,y:y-Math.sin(a)*back,vx:0,vy:0,r:Math.min(28,8+sp*1.2),life:1,decay:.05,c:accent,style,angle:a});
    }else if(style==='terminal'){
      // chars dropping behind
      if(sp>3){
        const ch="01<>{}/_=*+".charAt(Math.floor(Math.random()*11));
        particles.push({x:x+(Math.random()-.5)*8,y:y+(Math.random()-.5)*8,vx:0,vy:.4,r:12,life:1,decay:.025,c:accent,style,ch});
      }
    }else if(style==='crosshair'){
      // sharp brackets that fade
      particles.push({x,y,vx:0,vy:0,r:18+sp*.4,life:1,decay:.05,c:accent,style});
    }
  }
  function loop(){
    rx+=(tx-rx)*.18;ry+=(ty-ry)*.18;
    const style=curStyle();
    let dotRot='';let ringRot='';
    if(style==='ribbon'||style==='blade'){
      const deg=heading*180/Math.PI;
      dotRot=` rotate(${deg}deg)`;
      if(style==='blade')ringRot=` rotate(${deg+45}deg)`;
      else ringRot=` rotate(${deg}deg)`;
    }
    dot.style.transform=`translate3d(${tx}px,${ty}px,0) translate(-50%,-50%)${dotRot}`;
    ring.style.transform=`translate3d(${rx}px,${ry}px,0) translate(-50%,-50%)${ringRot}`;
    cx.clearRect(0,0,cv.width,cv.height);
    // 'lighter' looks great on dark BG, but turns the cursor invisible in light mode.
    // Use source-over for light, lighter for everything else.
    cx.globalCompositeOperation = document.documentElement.getAttribute('data-mode')==='light' ? 'source-over' : 'lighter';
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];p.x+=p.vx;p.y+=p.vy;
      if(p.style==='spark'){p.vy+=.12;p.vx*=.985}
      else if(p.style==='comet'){p.vx*=.96;p.vy*=.96;p.vy+=.04}
      else if(p.style==='nova'){p.vx*=.94;p.vy*=.94}
      else if(p.style==='pixel'){p.vy+=.05}
      else if(p.style==='terminal'){p.vy+=.02}
      p.life-=p.decay;
      if(p.life<=0){particles.splice(i,1);continue}
      cx.globalAlpha=p.life*.9;cx.fillStyle=p.c;
      if(p.style==='pixel'){cx.fillRect(p.x-p.r/2,p.y-p.r/2,p.r,p.r)}
      else if(p.style==='ribbon'){cx.globalAlpha=p.life*.5;cx.beginPath();cx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);cx.fill()}
      else if(p.style==='spark'){cx.fillRect(p.x-1,p.y-1,2,2);cx.globalAlpha=p.life*.4;cx.beginPath();cx.arc(p.x,p.y,p.r*p.life*1.6,0,Math.PI*2);cx.fill()}
      else if(p.style==='blade'){
        cx.save();cx.translate(p.x,p.y);cx.rotate(p.angle);cx.globalAlpha=p.life*.85;
        cx.fillStyle=p.c;cx.fillRect(-p.r,-1,p.r*2,2);
        cx.globalAlpha=p.life*.35;cx.fillRect(-p.r*.7,-3,p.r*1.4,6);
        cx.restore();
      }else if(p.style==='terminal'){
        cx.globalAlpha=p.life*.8;cx.fillStyle=p.c;
        cx.font='12px JetBrains Mono, monospace';cx.textAlign='center';cx.textBaseline='middle';
        cx.fillText(p.ch,p.x,p.y);
      }else if(p.style==='crosshair'){
        cx.globalAlpha=p.life*.5;cx.strokeStyle=p.c;cx.lineWidth=1;
        const r=p.r*(1.6-p.life);
        cx.beginPath();
        // four L-bracket corners
        const k=6;
        cx.moveTo(p.x-r,p.y-r+k);cx.lineTo(p.x-r,p.y-r);cx.lineTo(p.x-r+k,p.y-r);
        cx.moveTo(p.x+r-k,p.y-r);cx.lineTo(p.x+r,p.y-r);cx.lineTo(p.x+r,p.y-r+k);
        cx.moveTo(p.x+r,p.y+r-k);cx.lineTo(p.x+r,p.y+r);cx.lineTo(p.x+r-k,p.y+r);
        cx.moveTo(p.x-r+k,p.y+r);cx.lineTo(p.x-r,p.y+r);cx.lineTo(p.x-r,p.y+r-k);
        cx.stroke();
      }else{cx.beginPath();cx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);cx.fill()}
    }
    cx.globalAlpha=1;cx.globalCompositeOperation='source-over';
    requestAnimationFrame(loop);
  }
  loop();

  function curStyle(){return document.documentElement.getAttribute('data-cursor')||'comet'}
  function applyOff(){
    const off=curStyle()==='off';
    document.documentElement.style.cursor=off?'':'none';
    dot.style.display=off?'none':'';
    ring.style.display=off?'none':'';
    if(off){particles.length=0;cx.clearRect(0,0,cv.width,cv.height)}
  }
  applyOff();
  new MutationObserver(applyOff).observe(document.documentElement,{attributes:true,attributeFilter:['data-cursor']});

  let lastEmit=0;
  window.addEventListener('pointermove',e=>{
    if(curStyle()==='off')return;
    tx=e.clientX;ty=e.clientY;
    if(!vis){vis=true;rx=tx;ry=ty;dot.style.opacity='1';ring.style.opacity='1'}
    const now=performance.now();
    if(now-lastEmit>20){emit(tx,ty,curStyle());lastEmit=now}
  },{passive:true});
  window.addEventListener('pointerleave',()=>{vis=false;dot.style.opacity='0';ring.style.opacity='0'},{passive:true});
  document.addEventListener('mouseover',e=>{const el=e.target.closest&&e.target.closest(INT);ring.setAttribute('data-hover',el?'on':'off')});
  window.addEventListener('click',e=>{
    const style=curStyle();if(style==='off')return;
    let accent='#9b6cff';
    try{accent=window.__resolveAccent?.()||accent;}catch(e){}
    if(style!=='terminal'&&style!=='crosshair'){
      const r=document.createElement('div');r.className='cursor-ripple';r.style.left=e.clientX+'px';r.style.top=e.clientY+'px';
      if(style==='pixel'){r.style.borderRadius='0';r.style.width='12px';r.style.height='12px'}
      if(style==='blade'){r.style.borderRadius='0';r.style.width='2px';r.style.height='30px';r.style.transform=`translate(-50%,-50%) rotate(${heading*180/Math.PI}deg)`}
      document.body.appendChild(r);setTimeout(()=>r.remove(),580);
    }
    if(style==='spark'||style==='nova') for(let i=0;i<10;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*4;particles.push({x:e.clientX,y:e.clientY,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:2,life:1,decay:.045,c:accent,style:'spark'})}
    if(style==='blade'){for(let i=0;i<6;i++){const a=heading+(Math.random()-.5)*.6,sp=4+Math.random()*5;particles.push({x:e.clientX,y:e.clientY,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:2,life:1,decay:.05,c:accent,style:'spark'})}}
    if(style==='terminal'){const chars="01<>{}/_=*";for(let i=0;i<4;i++){particles.push({x:e.clientX+(Math.random()-.5)*16,y:e.clientY+(Math.random()-.5)*16,vx:(Math.random()-.5)*1.5,vy:-.5-Math.random(),r:12,life:1,decay:.035,c:accent,style:'terminal',ch:chars.charAt(Math.floor(Math.random()*chars.length))})}}
    if(style==='crosshair'){particles.push({x:e.clientX,y:e.clientY,vx:0,vy:0,r:24,life:1,decay:.04,c:accent,style:'crosshair'})}
  },{passive:true});
})();

/* ============================================================
 * SCROLL CHOREOGRAPHY
 * ------------------------------------------------------------
 * One IntersectionObserver for scroll-in reveals, plus a rAF
 * loop that drives the top progress bar and adds a `data-scrolled`
 * attribute to the nav once the page is past the hero. Cheap.
 *
 * If you add a new page-level component, drop `.reveal` on any
 * elements you want to animate in. Wrap a parent in
 * `.reveal-stagger` and inline-style `--i` on children for a
 * sequenced effect (see Home for an example).
 * ============================================================ */

/* Reveal-on-scroll (used by every page) */
const _io = new IntersectionObserver((entries)=>{
  for(const e of entries) if(e.isIntersecting) e.target.classList.add('in');
},{threshold:.12,rootMargin:'0px 0px -8% 0px'});
window.__observeReveal = (root=document)=>root.querySelectorAll('.reveal:not(.in)').forEach(el=>_io.observe(el));

/* Scroll progress + nav elevation + scroll-driven accent aura */
(function(){
  const bar = document.createElement('div');
  bar.className = 'scrollprog';
  document.body.appendChild(bar);
  // Soft accent aura that drifts down the page as you scroll —
  // adds a subtle "you are here" focus glow without being chrome.
  const aura = document.createElement('div');
  aura.className = 'scroll-aura';
  document.body.appendChild(aura);
  let raf = 0;
  function tick(){
    const doc = document.documentElement;
    const sh = doc.scrollHeight - doc.clientHeight;
    const p = sh > 0 ? Math.min(1, Math.max(0, doc.scrollTop / sh)) : 0;
    bar.style.setProperty('--sp', p.toFixed(4));
    doc.style.setProperty('--scroll-y', p.toFixed(4));
    // map scroll to aura position 10vh → 90vh
    aura.style.setProperty('--y', (10 + p * 80).toFixed(2) + 'vh');
    const nav = document.querySelector('.nav');
    if (nav) nav.setAttribute('data-scrolled', doc.scrollTop > 60 ? 'true' : 'false');
    raf = 0;
  }
  addEventListener('scroll', () => { if (!raf) raf = requestAnimationFrame(tick); }, { passive: true });
  tick();
})();
</script>

<script type="text/babel">
/* ============================================================
 * REACT APP — single Babel-transpiled module
 * ============================================================
 * No bundler. Babel-in-browser handles JSX at page load. All
 * components live in this one script for editability.
 *
 * MAP
 * ---
 *   Router      → parseHash / nav / useRoute
 *   Tweaks      → useTweaks / applyTweaks  (persists to LS + host)
 *   Owner auth  → sha256 + OwnerLogin modal
 *   Nav         → top bar + mobile drawer
 *   Monster     → wraps the canvas pixel sprite
 *   Home        → hero / projects / cursor lab / dispatch / study
 *   ProjectsPage / ProjectPage   → grid + detail
 *   Blog / PostReader / PostEditor / renderMarkdown
 *   StudyLab    → resource library (videos, pdfs, drive, etc)
 *   CursorLab   → live cursor picker
 *   About / Contact
 *   TweaksPanel / Cmdk          → floating controls
 *   App         → root, owns route + custom-content state
 *
 * CONVENTIONS
 * -----------
 *   • Pages are functions: function PageName({ … }) { … }
 *   • Class names follow BEM-ish flat: `.foo`, `.foo__bar`,
 *     `.foo--mod`. No nesting; no CSS-in-JS for static rules.
 *   • Anything user-tweakable goes through useTweaks() so it
 *     round-trips to the host edit-mode protocol.
 *   • Anything owner-editable in localStorage uses a versioned
 *     key like `gurman.<scope>.v<N>`.
 * ============================================================ */

const { useState, useEffect, useMemo, useRef, useCallback, useReducer } = React;
const MONSTERS = window.__MONSTERS;
const ACCENTS = ['indigo', 'purple', 'blue', 'cyan', 'green', 'yellow', 'gold', 'orange', 'red', 'pink'];

/* ------------------------------------------------------------
   useDataStore — subscribe the React tree to the publish-layer
   DataStore so that any successful publish (which calls
   DataStore.replace) re-renders the app with the new array.

   Returns the latest array for `scope`. Always falls back to
   window.__SCOPE if DataStore hasn't hydrated yet.
   ------------------------------------------------------------ */
function useDataStore(scope) {
  const [, force] = useReducer((n) => n + 1, 0);
  useEffect(() => window.DataStore?.subscribe(force), []);
  return (window.DataStore && window.DataStore.get(scope))
    || (scope === 'posts'    ? window.__POSTS
       : scope === 'projects' ? window.__PROJECTS
       : scope === 'study'    ? window.__STUDY_DEFAULTS
       : []);
}

/* ============= ROUTER ============= */
function parseHash() {const h = location.hash.replace(/^#\/?/, '') || 'home';const [a, b] = h.split('/');return { a, b: b || null };}
function nav(to) {location.hash = '#/' + to;window.scrollTo({ top: 0, behavior: 'instant' });}

function useRoute() {
  const [r, setR] = useState(parseHash());
  useEffect(() => {const fn = () => setR(parseHash());addEventListener('hashchange', fn);return () => removeEventListener('hashchange', fn);}, []);
  return r;
}

/* ============= TWEAKS ============= */
const TW_KEY = 'gurman.tweaks.v2';
function loadTweaks() {
  try {const r = localStorage.getItem(TW_KEY);if (r) return { ...window.TWEAK_DEFAULTS, ...JSON.parse(r) };} catch {}
  return { ...window.TWEAK_DEFAULTS };
}
function applyTweaks(t) {
  const r = document.documentElement;
  r.setAttribute('data-mode', t.mode === 'system' ? matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark' : t.mode);
  r.setAttribute('data-accent', t.accent);
  r.setAttribute('data-monsters', t.monsters ? 'on' : 'off');
  r.setAttribute('data-cursor', t.cursor || 'comet');
  r.setAttribute('data-density', t.density);
  r.style.setProperty('--motion', t.motion === 'none' ? '0' : t.motion === 'subtle' ? '.5' : '1');
  r.style.setProperty('--density', t.density === 'compact' ? '.85' : t.density === 'roomy' ? '1.15' : '1');
  const fonts = { 'source-serif': "'Source Serif 4',Georgia,serif", 'georgia': "Georgia,serif", 'garamond': "'EB Garamond',Georgia,serif", 'times': "'Times New Roman',serif" };
  r.style.setProperty('--font-serif', fonts[t.blogFont] || fonts['source-serif']);
}

function useTweaks() {
  const [t, setT] = useState(loadTweaks);
  useEffect(() => {applyTweaks(t);try {localStorage.setItem(TW_KEY, JSON.stringify(t));} catch {}}, [t]);
  const set = useCallback((k, v) => setT((s) => {
    const next = typeof k === 'object' ? { ...s, ...k } : { ...s, [k]: v };
    try {parent.postMessage({ type: '__edit_mode_set_keys', edits: typeof k === 'object' ? k : { [k]: v } }, '*');} catch {}
    return next;
  }), []);
  return [t, set];
}

/* ============= OWNER AUTH (sha-256 hash compare) ============= */
async function sha256(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, '0')).join('');
}

/* ============= NAV ============= */
function Nav({ route, onTweaks, onCmdk, owner }) {
  const [open, setOpen] = useState(false);
  const links = [{ k: 'home', l: 'index' }, { k: 'projects', l: 'projects' }, { k: 'blog', l: 'dispatch' }, { k: 'study', l: 'study' }, { k: 'about', l: 'about' }, { k: 'contact', l: 'contact' }];
  return <>
    <header className="nav">
      <div className="nav__row">
        <a className="nav__logo" onClick={(e) => {e.preventDefault();nav('home');}} href="#/home">
          <span className="nav__dot" /><span>Gurman S<small>.dev</small></span>
        </a>
        <nav className="nav__links">
          {links.map((l) => <a key={l.k} className="nav__link" data-active={route.a === l.k || l.k === 'blog' && route.a === 'post'} onClick={() => nav(l.k)}>{l.l}</a>)}
        </nav>
        <div className="nav__spacer" />
        {owner && <a className="nav__console" onClick={(e) => { e.preventDefault(); nav('console'); }} href="#/console" data-active={route.a === 'console'}>console</a>}
        <button className="nav__tool" onClick={onCmdk} title="search"><span>⌘</span><span>K</span></button>

/* ============================================================
 * SectionIndex
 * ------------------------------------------------------------
 * Floating vertical dots on the right edge of long pages.
 * Pass an array of { id, label }. Clicking scrolls to the
 * matching DOM element with [data-section=<id>]. The dot for
 * the currently-on-screen section gets aria-current="true".
 * ============================================================ */
function SectionIndex({ sections }) {
  const [active, setActive] = useState(sections[0]?.id);
  useEffect(() => {
    const els = sections.map(s => document.querySelector(`[data-section="${s.id}"]`)).filter(Boolean);
    if (!els.length) return;
    const io = new IntersectionObserver((entries) => {
      // pick the entry whose top is closest to the viewport top (and inside it)
      const visible = entries.filter(e => e.isIntersecting);
      if (visible.length) {
        visible.sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
        setActive(visible[0].target.dataset.section);
      }
    }, { rootMargin: '-30% 0px -60% 0px', threshold: 0 });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, [sections]);
  return (
    <div className="sectionidx" aria-label="page sections">
      {sections.map(s => (
        <button key={s.id} className="sectionidx__dot" aria-current={active === s.id} data-label={s.label}
          onClick={() => {
            const el = document.querySelector(`[data-section="${s.id}"]`);
            if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 60, behavior: 'smooth' });
          }} />
      ))}
    </div>
  );
}
