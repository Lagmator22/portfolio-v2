/* ============= STUDY LAB ============= */
/* ============================================================
 * STUDY LAB
 * ============================================================
 * A resource library curated by the owner, public-readable.
 * Stored in localStorage under STUDY_KEY so it survives reloads
 * on this static host.
 *
 * --------- ADDING A NEW RESOURCE KIND ---------
 * To add a new kind (e.g. "podcast", "spreadsheet"), do TWO things:
 *   1. Add a key + label + glyph + hue to STUDY_KINDS below.
 *   2. (optional) Add a .study__card--<kind>::before color rule
 *      in the CSS — otherwise it falls back to the accent gradient.
 * That's it. The filter pill, the editor modal, the card chip,
 * and the color accent all read off STUDY_KINDS automatically.
 *
 * --------- ADDING A RESOURCE ITEM ---------
 * Either sign in as owner and use the UI, or push directly to
 * STUDY_DEFAULTS below. Each item shape:
 *   { id, kind, title, course, tags:[], url, note, added }
 * ============================================================ */
// Bumped to v3 to invalidate any browser-cached copies of the old demo
// "Link 1/2/3 — replace url..." defaults from before the seed was emptied.
const STUDY_KEY = 'gurman.study.v3';
// hue is the OKLCH hue (0–360) used for the left-edge accent bar.
// To add a new kind: drop a line here. To remove one: delete its line.
const STUDY_KINDS = {
  video:  { label: 'video',  glyph: '▶',  hue: 25  },
  drive:  { label: 'drive',  glyph: '◇',  hue: 150 },
  link:   { label: 'link',   glyph: '→',  hue: 245 },
  notes:  { label: 'notes',  glyph: '✎',  hue: 310 },
  code:   { label: 'code',   glyph: '〈〉', hue: 200 },
  blog:   { label: 'blog',   glyph: '✦',  hue: 50  },
  github: { label: 'github', glyph: '◉',  hue: 280 },
  slides: { label: 'slides', glyph: '▤',  hue: 350 }
};
// STUDY_DEFAULTS = the seed list shown when data/study.json is empty.
// Edit the title/url/note in place to point at real resources, or use the
// Owner Console "+ link" button (persists to data/study.json on publish).
// Item shape:
//   { id, kind, title, course?, tags[], url, note?, added: 'YYYY-MM-DD' }
// `kind` must be a key of STUDY_KINDS above (drive, video, link, notes,
// code, blog, github, slides).
const STUDY_DEFAULTS = [
  { id: 's-link-1', kind: 'drive', title: 'Drive folder',  course: '', tags: [], url: '#', note: '', added: '2026-05-17' },
  { id: 's-link-2', kind: 'drive', title: 'Drive folder',  course: '', tags: [], url: '#', note: '', added: '2026-05-17' },
  { id: 's-link-3', kind: 'video', title: 'Video archive', course: '', tags: [], url: '#', note: '', added: '2026-05-17' }
];
window.__STUDY_DEFAULTS = STUDY_DEFAULTS; // exposed for publish/data-store.js fallback path
function StudyLab({ owner }) {
  const remoteStudy = useDataStore('study');
  // Loader rule: localStorage represents the owner's local drafts. Use it
  // only when it's a non-empty array. An empty array means "no drafts" —
  // fall back to remote (data/study.json) or the inline STUDY_DEFAULTS.
  // This prevents an empty cache (left over from a cache-key bump) from
  // permanently overriding fresh remote/inline content.
  const [items, setItems] = useState(() => {
    try {
      const r = JSON.parse(localStorage.getItem(STUDY_KEY));
      if (Array.isArray(r) && r.length > 0) return r;
    } catch {}
    return remoteStudy && remoteStudy.length ? remoteStudy : STUDY_DEFAULTS;
  });
  // When the published study list updates from a publish, mirror it in if the
  // local cache is missing or empty (no local drafts to clobber).
  useEffect(() => {
    if (!remoteStudy || !remoteStudy.length) return;
    try {
      const local = JSON.parse(localStorage.getItem(STUDY_KEY) || 'null');
      if (!Array.isArray(local) || local.length === 0) setItems(remoteStudy);
    } catch { setItems(remoteStudy); }
  }, [remoteStudy]);
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [editing, setEditing] = useState(null);
  const fileRef = useRef();
  useEffect(() => { try { localStorage.setItem(STUDY_KEY, JSON.stringify(items)); } catch {}; window.__observeReveal?.(); }, [items]);
  const kinds = ['all', ...Object.keys(STUDY_KINDS)];
  const courses = Array.from(new Set(items.map(i => i.course).filter(Boolean)));
  const filtered = items.filter(i =>
    (filter === 'all' || i.kind === filter || i.course === filter) &&
    (search === '' || i.title.toLowerCase().includes(search.toLowerCase()) || (i.note||'').toLowerCase().includes(search.toLowerCase()) || (i.tags||[]).some(t => t.toLowerCase().includes(search.toLowerCase())))
  );
  const save = (it) => {
    setItems((prev) => {
      const others = prev.filter(x => x.id !== it.id);
      const next = { ...it, id: it.id || ('s-' + Date.now()), added: it.added || new Date().toISOString().slice(0,10) };
      return [next, ...others];
    });
    setEditing(null);
  };
  const del = (it) => { if (confirm('Remove from study lab?')) setItems(prev => prev.filter(x => x.id !== it.id)); };
  const onFile = async (e) => {
    const f = e.target.files[0]; if (!f) return;
    let url, note = 'uploaded · ' + Math.round(f.size/1024) + 'kb';
    // Prefer a configured storage adapter so the URL survives a reload.
    // Fall back to an inline data URL for unconfigured ('none') accounts.
    try {
      const adapter = window.StorageAdapter?.current();
      if (adapter && adapter.kind && adapter.kind !== 'none') {
        const r = await adapter.upload(f, { hint: 'study-lab' });
        if (r?.url) { url = r.url; note += ' · ' + adapter.kind; }
      }
    } catch (err) {
      console.warn('[study-lab] storage adapter upload failed, falling back to data URL:', err);
    }
    if (!url) {
      url = await new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(f); });
      note += ' · local (data URL — won\'t survive a reload)';
    }
    const kind = f.type.startsWith('video/') ? 'video' : 'link';
    save({ id: 's-' + Date.now(), kind, title: f.name, course: editing?.course || '', tags: [], url, note, added: new Date().toISOString().slice(0,10) });
    e.target.value = '';
  };
  return (
    <main className="section">
      <div className="shell">
        <div className="section__hd reveal">
          <div>
            <div className="section__idx">STUDY LAB{items.length > 0 ? ' · ' + items.length + ' resources' : ''}</div>
            <h2 className="section__title">A shared desk for the cohort.</h2>
          </div>
          <p className="section__copy">Lectures, scans, problem-sets, and Drive folders. Filter by course or kind. Click anything to open. {owner ? '' : 'Sign in as owner to add, edit, or remove.'}</p>
        </div>

        <div className="study__controls">
          <div className="study__pills">
            {kinds.map(k => (
              <button key={k} aria-pressed={filter===k} onClick={() => setFilter(k)} className="study__pill">
                {k === 'all' ? 'all' : (STUDY_KINDS[k]?.label || k)}
              </button>
            ))}
            {courses.length > 0 && <span className="study__sep">/</span>}
            {courses.map(c => (
              <button key={c} aria-pressed={filter===c} onClick={() => setFilter(c)} className="study__pill study__pill--course">
                {c}
              </button>
            ))}
          </div>
          <div className="study__searchwrap">
            <input className="study__search" placeholder="search title, tag, note…" value={search} onChange={e => setSearch(e.target.value)} />
            {owner && <>
              <input ref={fileRef} type="file" accept="video/*" style={{ display:'none' }} onChange={onFile} />
              <button className="btn btn--sm" onClick={() => fileRef.current.click()}>upload</button>
              <button className="btn btn--primary btn--sm" onClick={() => setEditing({ kind:'link', title:'', course:'', tags:[], url:'', note:'' })}>+ link</button>
            </>}
          </div>
        </div>

        <div className="study__grid">
          {filtered.map((it) => {
            const k = STUDY_KINDS[it.kind] || { label: it.kind, glyph: '·', hue: 275 };
            return (
              <article key={it.id} className="study__card reveal" style={{ '--k-hue': k.hue }}>
                <a className="study__cardlink" href={it.url || '#'} target="_blank" rel="noopener noreferrer" onClick={e => { if (!it.url) e.preventDefault(); }}>
                  <div className="study__cardhd">
                    <span className="study__kind">{k.glyph} {k.label}</span>
                    {it.course && <span className="study__course">{it.course}</span>}
                  </div>
                  <h3 className="study__title">{it.title}</h3>
                  {it.note && <p className="study__note">{it.note}</p>}
                  <div className="study__foot">
                    <div className="study__tags">{(it.tags||[]).map(t => <span key={t} className="chip">#{t}</span>)}</div>
                    <span className="study__date">{it.added}</span>
                  </div>
                </a>
                {owner && (
                  <div className="study__ops">
                    <button className="btn btn--sm" onClick={() => setEditing(it)}>edit</button>
                    <button className="btn btn--sm" onClick={() => del(it)}>×</button>

/* ============= MARKDOWN-LITE RENDERER ============= */
function renderMarkdown(src) {
  if (!src) return [];
  const lines = src.split('\n');
  const out = [];
  let i = 0;
  while (i < lines.length) {
    const ln = lines[i];
    if (ln.startsWith('## ')) {out.push({ k: 'h2', t: ln.slice(3) });i++;continue;}
    if (ln.startsWith('### ')) {out.push({ k: 'h3', t: ln.slice(4) });i++;continue;}
    if (ln.startsWith('> ')) {out.push({ k: 'q', t: ln.slice(2) });i++;continue;}
    if (ln.startsWith('LEAD: ')) {out.push({ k: 'lead', t: ln.slice(6) });i++;continue;}
    if (ln.startsWith('- ')) {const items = [];while (i < lines.length && lines[i].startsWith('- ')) {items.push(lines[i].slice(2));i++;}out.push({ k: 'ul', items });continue;}
    if (ln.startsWith('```')) {const lang = ln.slice(3);const buf = [];i++;while (i < lines.length && !lines[i].startsWith('```')) {buf.push(lines[i]);i++;}i++;out.push({ k: 'code', t: buf.join('\n'), lang });continue;}
    if (ln.trim() === '') {i++;continue;}
    out.push({ k: 'p', t: ln });i++;
  }
  return out;
}
function escHtml(s) {return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');}
function safeUrl(u) {const t = String(u || '').trim();if (/^(javascript|data|vbscript):/i.test(t)) return '#';return t;}
function inline(t) {
  // Escape FIRST so authored content can't inject script/iframe/etc.
  return escHtml(t).
  replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>').
  replace(/\*([^*]+)\*/g, '<i>$1</i>').
  replace(/`([^`]+)`/g, '<code>$1</code>').
  replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, txt, url) => `<a href="${escHtml(safeUrl(url))}" target="_blank" rel="noopener noreferrer">${txt}</a>`);
}

      <div className="body">

          if (b.k === 'h3') return <h3 key={i} className="reveal">{b.t}</h3>;
          if (b.k === 'lead') return <p key={i} className="reveal" style={{ fontSize: 22, fontStyle: 'italic', color: 'var(--ink-2)', marginBottom: 24 }} dangerouslySetInnerHTML={{ __html: inline(b.t) }} />;
          if (b.k === 'q') return <blockquote key={i} className="reveal">{b.t}</blockquote>;
          if (b.k === 'ul') return <ul key={i} className="reveal">{b.items.map((it, j) => <li key={j} dangerouslySetInnerHTML={{ __html: inline(it) }} />)}</ul>;
          if (b.k === 'code') return <pre key={i} className="reveal"><code>{b.t}</code></pre>;
          return <p key={i} className="reveal" dangerouslySetInnerHTML={{ __html: inline(b.t) }} />;
        })}
      </div>
    </main>);

}

 * sends a confirmation email to the owner inbox. CLICK THE LINK
 * in that email once to activate; submissions land in the inbox
 * from then on. To change the receiving address, swap the parts
 * in INBOX_PARTS below — it is assembled from fragments so the
 * literal email never appears in the rendered DOM.
 *
 * To rotate to an opaque hashed endpoint (recommended if you ever
 * publish this repo): submit once, then replace the URL with the
 * /ajax/<hash> alias FormSubmit emails back.
 * ============================================================ */
const INBOX_PARTS = ['gsingh16', '_be24', '@', 'thapar', '.edu'];
const CONTACT_ENDPOINT = 'https://formsubmit.co/ajax/' + INBOX_PARTS.join('');

// Strict-ish email regex: local@host.tld with no leading/trailing dots, no
// consecutive dots, at least one TLD dot. Catches the common typos that
// HTML5's loose default allows (e.g. "a@b").
const EMAIL_RX = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9](?:[A-Za-z0-9-]{0,61}[A-Za-z0-9])?(?:\.[A-Za-z0-9](?:[A-Za-z0-9-]{0,61}[A-Za-z0-9])?)+$/;

// Ask Cloudflare's DNS-over-HTTPS whether the domain has MX (mail) records.
// Returns true if MX exists, false if the domain definitely has no mail server,
// null if the DNS query itself failed (caller decides whether to allow through).
async function _domainHasMx(domain) {
  try {
    const r = await fetch('https://cloudflare-dns.com/dns-query?name=' + encodeURIComponent(domain) + '&type=MX', {
      headers: { 'Accept': 'application/dns-json' },
    });
    if (!r.ok) return null;
    const j = await r.json();
    // Status 0 = NOERROR; Answer present + non-empty means MX records exist.
    // Also accept A-record fallback: many domains accept mail at their A host.
    if (j.Status === 0 && Array.isArray(j.Answer) && j.Answer.some(a => a.type === 15)) return true;
    return false;
  } catch (e) { return null; }
}

async function validateEmail(email) {
  if (!email) return { ok: false, reason: 'Please enter an email address.' };
  if (!EMAIL_RX.test(email)) return { ok: false, reason: 'That doesn\'t look like a valid email address.' };
  const domain = email.split('@')[1].toLowerCase();
  const mx = await _domainHasMx(domain);
  if (mx === false) return { ok: false, reason: 'No mail server found for "' + domain + '". Check the spelling.' };
  // mx === null means DNS check itself failed — let it through; FormSubmit will catch the rest.
  return { ok: true };
}

function Contact() {
  const [status, setStatus] = useState('idle'); // idle | sending | sent | error
  const [errorMsg, setErrorMsg] = useState('');
  const [emailErr, setEmailErr] = useState('');
  const [draft, setDraft] = useState({ name: '', email: '', topic: 'work', msg: '' });
  const [honeypot, setHoneypot] = useState('');
  const MAILTO_HREF = 'mailto:' + INBOX_PARTS.join('') + '?subject=' + encodeURIComponent('portfolio contact');
  useEffect(() => {window.__observeReveal?.();}, []);
  const submit = async (e) => {
    e.preventDefault();
    if (status === 'sending') return;
    // Honeypot: real humans never fill this. If filled, pretend success silently.
    if (honeypot) { setStatus('sent'); setDraft({ name: '', email: '', topic: 'work', msg: '' }); setTimeout(() => setStatus('idle'), 6000); return; }
    // Validate the sender's email before spending a FormSubmit call on it.
    setStatus('sending');
    setEmailErr('');
    const ev = await validateEmail(draft.email);
    if (!ev.ok) { setEmailErr(ev.reason); setStatus('idle'); return; }
    try {
      const res = await fetch(CONTACT_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({
          name: draft.name,
          email: draft.email,
          topic: draft.topic,
          message: draft.msg,
          _subject: `[portfolio · ${draft.topic}] ${draft.name}`,
          _template: 'table',
          _captcha: 'false',
          _replyto: draft.email
        })
      });
      let data = {};
      try { data = await res.json(); } catch {}
      // FormSubmit returns 200 OK with {"success":"false", ...} when it rejects
      // (wrong Origin, missing fields, etc.). Trust the JSON's success field if
      // present; fall back to HTTP status only when the body has no success key.
      const apiOk   = data.success === 'true' || data.success === true;
      const apiFail = data.success === 'false' || data.success === false;
      const ok = res.ok && (apiOk || (!apiFail && data.success === undefined && res.status < 400));
      if (!ok) throw new Error(data.message || ('bad status ' + res.status));
      setStatus('sent');
      setErrorMsg('');
      setDraft({ name: '', email: '', topic: 'work', msg: '' });
      setTimeout(() => setStatus(s => s === 'sent' ? 'idle' : s), 10000);
    } catch (err) {
      console.error('contact form send failed', err);
      setErrorMsg(err?.message || 'could not deliver right now.');
      setStatus('error');
      setTimeout(() => setStatus(s => s === 'error' ? 'idle' : s), 10000);
    }
  };

  return (
    <main className="section">
      <div className="shell">
        <div className="section__hd reveal">
          <div><div className="section__idx">CONTACT · always open</div><h2 className="section__title">Drop a line. Or two. <em style={{ fontFamily: 'var(--font-serif)', fontStyle: 'italic', color: 'var(--accent)' }}>I read everything.</em></h2></div>
          <p className="section__copy">For collaborations, commissions, recruiting, study-group invites, or to argue about C++ template instantiation rules. I reply within a week — usually a day.</p>
        </div>
        <div className="contact-grid">
          <form className="contact-form reveal" onSubmit={submit}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
              <div className="field"><label>your name</label><input value={draft.name} onChange={(e) => setDraft({ ...draft, name: e.target.value })} placeholder="alex h." required /></div>
              <div className="field">
                <label>your email</label>
                <input type="email" value={draft.email}
                  onChange={(e) => { setDraft({ ...draft, email: e.target.value }); if (emailErr) setEmailErr(''); }}
                  onBlur={async () => { if (!draft.email) return; const ev = await validateEmail(draft.email); setEmailErr(ev.ok ? '' : ev.reason); }}
                  aria-invalid={!!emailErr}
                  style={emailErr ? { borderColor: 'oklch(0.72 0.18 25)' } : undefined}
                  placeholder="you@somewhere.dev" required />
                {emailErr && <div role="alert" style={{ color: 'oklch(0.72 0.18 25)', fontSize: 12, marginTop: 6, lineHeight: 1.4 }}>⚑ {emailErr}</div>}
              </div>
            </div>
            <div className="field">
              <label>topic</label>
              <div className="study__pills" style={{ marginBottom: 0 }}>
                {['work','collab','recruit','study','other'].map(t => (
                  <button key={t} type="button" className="study__pill" aria-pressed={draft.topic===t} onClick={() => setDraft({ ...draft, topic: t })}>{t}</button>
                ))}
              </div>
            </div>
            <div className="field"><label>message</label><textarea value={draft.msg} onChange={(e) => setDraft({ ...draft, msg: e.target.value })} placeholder="hey gurman, …" required /></div>
            {/* Honeypot — invisible to humans, irresistible to naive bots. */}
            <label aria-hidden="true" tabIndex={-1} style={{ position:'absolute', left:'-9999px', top:0, opacity:0, pointerEvents:'none' }}>
              keep this field empty
              <input type="text" name="_honey" tabIndex={-1} autoComplete="off" value={honeypot} onChange={(e) => setHoneypot(e.target.value)} />
            </label>
            <div style={{ display:'flex', alignItems:'center', gap:14, flexWrap:'wrap' }}>
              <button className="btn btn--primary" type="submit" disabled={status==='sending'}>
                {status==='sending' ? 'sending…' : 'send'} <span className="arrow">→</span>

/* ============= OWNER LOGIN =============
 * Password is matched against a SHA-256 hash baked into the file (the
 * `ownerHash` field of TWEAK_DEFAULTS at the top of <head>). The page never
 * sees plaintext, and no plaintext lives in the source.
 *
 * Unlocking does NOT grant write access to GitHub — it only reveals the
 * editor UI in this browser. Real publishing also requires a GitHub PAT
 * configured in the Owner Console (#/console).
 *
 * To rotate the password:
 *   echo -n "your-new-password" | shasum -a 256
 *   Paste the 64-char hex into TWEAK_DEFAULTS.ownerHash above. Commit, push.
 *
 * The explanatory copy that used to render in this modal was removed so
 * a stranger viewing the page doesn't get a tutorial on the mechanism;
 * keep it here as a comment for whoever edits this next.
 */
function OwnerLogin({ onClose, onUnlock, expectedHash }) {
  const [pw, setPw] = useState('');
  const [err, setErr] = useState(false);
  const try_ = async () => {
    const h = await sha256(pw);
    if (h === expectedHash) {onUnlock();onClose();} else setErr(true);
  };
  return (
    <div className="modal-bg" onClick={(e) => {if (e.target === e.currentTarget) onClose();}}>
      <div className="modal">
        <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 28, fontWeight: 600, letterSpacing: '-0.02em', margin: '8px 0 12px' }}>Sign in.</h2>
        <input type="password" autoFocus value={pw} onChange={(e) => {setPw(e.target.value);setErr(false);}}
        onKeyDown={(e) => e.key === 'Enter' && try_()}
        placeholder="password"
        style={{ width: '100%', padding: 12, fontFamily: 'var(--font-mono)', fontSize: 14, background: 'var(--bg-sunken)', border: `1px solid ${err ? 'oklch(0.72 0.18 25)' : 'var(--line)'}`, color: 'var(--ink)', borderRadius: 8, outline: 'none' }} />
        {err && <div style={{ color: 'oklch(0.72 0.18 25)', fontSize: 12, marginTop: 6 }}>nope</div>}
        <div style={{ display: 'flex', gap: 8, marginTop: 16, justifyContent: 'flex-end' }}>
          <button className="btn" onClick={onClose}>cancel</button>
          <button className="btn btn--primary" onClick={try_}>unlock</button>
        </div>
      </div>
    </div>);

}

    <div className="modal-bg" onClick={(e) => {if (e.target === e.currentTarget) onClose();}}>
      <div style={{ background: 'var(--bg-raised)', border: '1px solid var(--line)', borderRadius: 14, width: 'min(560px,94vw)', overflow: 'hidden' }}>
        <input autoFocus placeholder="type to search…" value={q} onChange={(e) => setQ(e.target.value)}
        style={{ width: '100%', padding: '14px 18px', fontFamily: 'var(--font-mono)', fontSize: 14, background: 'transparent', color: 'var(--ink)', border: 0, borderBottom: '1px solid var(--line)', outline: 'none' }} />
        <div style={{ maxHeight: '50vh', overflow: 'auto' }}>
          {items.slice(0, 20).map((it, i) =>
          <button key={i} onClick={it.act}
          style={{ display: 'block', width: '100%', textAlign: 'left', padding: '10px 18px', fontFamily: 'var(--font-mono)', fontSize: 13, color: 'var(--ink-2)', background: 'transparent', border: 0, cursor: 'pointer' }}
          onMouseOver={(e) => e.currentTarget.style.background = 'var(--surface)'}
          onMouseOut={(e) => e.currentTarget.style.background = 'transparent'}>
              {it.l}
            </button>
          )}
          {items.length === 0 && <div style={{ padding: 18, color: 'var(--ink-4)', fontSize: 12 }}>no matches</div>}
        </div>
      </div>
    </div>);

}

/* ============= APP ============= */
function App() {
  const route = useRoute();
  const [tweaks, setTweak] = useTweaks();
  const [tweakOpen, setTweakOpen] = useState(false);
  const [cmdkOpen, setCmdkOpen] = useState(false);
  const [owner, setOwner] = useState(() => sessionStorage.getItem('gurman.owner.session') === 'on');
  const [showLogin, setShowLogin] = useState(false);
  const [editingPost, setEditingPost] = useState(null); // post object or {} for new
  // Keys bumped to v3 to invalidate browser caches that may hold the old
  // 4 "reserved-N" placeholder project patches / placeholder post drafts.
  const [customPosts, setCustomPosts] = useState(() => {try {return JSON.parse(localStorage.getItem('gurman.custom.posts.v3')) || [];} catch {return [];}});
  const [customProjs, setCustomProjs] = useState(() => {try {return JSON.parse(localStorage.getItem('gurman.custom.projs.v3')) || {};} catch {return {};}});
  useEffect(() => {localStorage.setItem('gurman.custom.posts.v3', JSON.stringify(customPosts));}, [customPosts]);
  useEffect(() => {localStorage.setItem('gurman.custom.projs.v3', JSON.stringify(customProjs));}, [customProjs]);

  // Live data, hydrated from data/*.json with inline fallback. See publish/data-store.js.
  const POSTS = useDataStore('posts');
  const PROJECTS = useDataStore('projects');

  // ⌘K
  useEffect(() => {
    const fn = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {e.preventDefault();setCmdkOpen((o) => !o);} else
      if (e.key === 'Escape') {setCmdkOpen(false);setTweakOpen(false);}
    };
    addEventListener('keydown', fn);return () => removeEventListener('keydown', fn);
  }, []);

  // host tweak protocol
  useEffect(() => {
    const fn = (ev) => {
      if (ev.data?.type === '__activate_edit_mode') setTweakOpen(true);
      if (ev.data?.type === '__deactivate_edit_mode') setTweakOpen(false);
    };
    addEventListener('message', fn);
    parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => removeEventListener('message', fn);
  }, []);

  useEffect(() => {setTimeout(() => window.MonsterRenderer?.mountAll(document), 50);}, [route.a, route.b, owner]);

  const allPosts = useMemo(() => [...customPosts, ...POSTS.filter((p) => !customPosts.find((c) => c.id === p.id))], [customPosts, POSTS]);
  const allProjs = useMemo(() => PROJECTS.map((p) => customProjs[p.id] ? { ...p, ...customProjs[p.id] } : p), [customProjs, PROJECTS]);

  const savePost = (p) => {
    setCustomPosts((prev) => {
      const others = prev.filter((x) => x.id !== p.id);
      return [p, ...others];
    });
    setEditingPost(null);
  };
  const deletePost = (p) => {
    setCustomPosts((prev) => {
      const exists = prev.find((x) => x.id === p.id);
      if (exists) return prev.filter((x) => x.id !== p.id);
      // mark as hidden
      return [{ ...p, _hidden: true }, ...prev];
    });
  };
  const exportPost = (p) => {
    navigator.clipboard.writeText(JSON.stringify(p, null, 2));
    alert('JSON copied. Paste into data/posts.json on github, or click "publish" to commit directly.');
  };

  const toggleOwner = () => {
    if (owner) {sessionStorage.removeItem('gurman.owner.session');setOwner(false);} else
    setShowLogin(true);
  };

  let page;
  if (route.a === 'home') page = <Home posts={allPosts} projects={allProjs} onPost={(p) => nav('post/' + p.id)} onProject={(p) => nav('projects/' + p.id)} />;else
  if (route.a === 'projects' && route.b) {
    const p = allProjs.find((x) => x.id === route.b);
    page = p ? <ProjectPage project={p} owner={owner} onSave={(patch) => setCustomProjs((c) => ({ ...c, [p.id]: { ...(c[p.id] || {}), ...patch } }))} onBack={() => nav('projects')} /> :
    <main className="section"><div className="shell">not found <button className="btn btn--sm" onClick={() => nav('projects')}>back</button></div></main>;
  } else
  if (route.a === 'projects') page = <ProjectsPage projects={allProjs} onProject={(p) => nav('projects/' + p.id)} />;else
  if (route.a === 'blog') page = <Blog posts={allPosts.filter((p) => !p._hidden)} owner={owner} onPost={(p) => nav('post/' + p.id)} onNewPost={() => setEditingPost({})} onEditPost={(p) => setEditingPost(p)} onDeletePost={deletePost} />;else
  if (route.a === 'post' && route.b) {
    const p = allPosts.find((x) => x.id === route.b);
    page = <PostReader post={p} onBack={() => nav('blog')} />;
  } else
  if (route.a === 'about') page = <About />;else
  if (route.a === 'study') page = <StudyLab owner={owner} />;else
  if (route.a === 'contact') page = <Contact />;else
  if (route.a === 'console') {
    if (owner) page = <OwnerConsole onExit={() => nav('home')} />;
    else { page = <main className="section"><div className="shell" style={{ padding: '80px 0' }}><div className="kicker">restricted</div><h2 className="section__title">Sign in as owner to access the console.</h2><div style={{ display: 'flex', gap: 10, marginTop: 18 }}><button className="btn btn--primary" onClick={() => setShowLogin(true)}>sign in</button><button className="btn" onClick={() => nav('home')}>back home</button></div></div></main>; }
  } else
  page = <Home posts={allPosts} projects={allProjs} onPost={(p) => nav('post/' + p.id)} onProject={(p) => nav('projects/' + p.id)} />;

  return <>
    <Nav route={route} owner={owner} onTweaks={() => setTweakOpen((o) => !o)} onCmdk={() => setCmdkOpen(true)} />
    <div key={route.a + '/' + (route.b || '')} className="page-enter" data-screen-label={route.a}>{page}</div>
    <footer className="footer shell">
      <div className="footer__top">
        <div>
          <h3 className="footer__brand">Gurman <em>S.</em></h3>
          <p className="footer__tag">Edge inference, local-first AI, and the kind of small tools that quietly out-run the loud ones. Familiars included.</p>
        </div>
        <div className="footer__col">
          <h4>map</h4>
          <ul>
            <li><a onClick={() => nav('home')} href="#/home">index</a></li>
            <li><a onClick={() => nav('projects')} href="#/projects">projects</a></li>
            <li><a onClick={() => nav('blog')} href="#/blog">dispatch</a></li>
            <li><a onClick={() => nav('study')} href="#/study">study lab</a></li>
            <li><a onClick={() => nav('about')} href="#/about">about</a></li>
            <li><a onClick={() => nav('contact')} href="#/contact">contact</a></li>
          </ul>
        </div>
        <div className="footer__col">
          <h4>elsewhere</h4>
          <ul>
            <li><a href="https://github.com/Lagmator22" target="_blank" rel="noopener noreferrer">github</a></li>
            <li><a href="https://www.linkedin.com/in/ouroboros22/" target="_blank" rel="noopener noreferrer">linkedin</a></li>
            <li><a href="https://discordapp.com/users/787266956449153024" target="_blank" rel="noopener noreferrer">discord</a></li>
            <li><a href="https://lagmator22.github.io/Portfolio" target="_blank" rel="noopener noreferrer">live site</a></li>
            <li><a onClick={() => nav('contact')} href="#/contact">contact form</a></li>
          </ul>
        </div>
        <div className="footer__col">
          <h4>system</h4>
          <ul>
            <li><a onClick={() => setCmdkOpen(true)} href="#">⌘K · search</a></li>
            <li><a onClick={() => setTweakOpen(true)} href="#">theme · tweaks</a></li>
            <li><button onClick={toggleOwner} style={{ background:'none', border:0, padding:0, color:'inherit', fontFamily:'inherit', fontSize:'inherit', cursor:'pointer', textAlign:'left' }}>{owner ? 'lock owner' : 'owner sign-in'}</button></li>
          </ul>
        </div>
      </div>
      <div className="footer__bottom">
        <span>© 2026 · gurman s. · pixel monsters · local first</span>
        <span className="blip">all systems go</span>
      </div>
    </footer>
    {owner && <button className="owner-badge" onClick={toggleOwner} title="click to lock"><span className="pulse" />owner mode</button>}
    <TweaksPanel open={tweakOpen} onClose={() => setTweakOpen(false)} tweaks={tweaks} setTweak={setTweak} />
    <Cmdk open={cmdkOpen} onClose={() => setCmdkOpen(false)} posts={allPosts} projects={allProjs} />
    {showLogin && <OwnerLogin onClose={() => setShowLogin(false)} onUnlock={() => {sessionStorage.setItem('gurman.owner.session', 'on');setOwner(true);}} expectedHash={tweaks.ownerHash} />}
    {editingPost && <PostEditor post={editingPost.id ? editingPost : null} onSave={savePost} onCancel={() => setEditingPost(null)} onExport={exportPost} />}
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
